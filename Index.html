// portionUnits: [{label:"1 stk", grams:"150"}, {label:"1 pk", grams:"500"}, {label:"1 ts", grams:"5"}]

function calcNutr(ings,srv=1){
  const t={};ALL_NUTR.forEach(f=>{t[f.key]=0;});
  ings.forEach(i=>{ALL_NUTR.forEach(f=>{t[f.key]+=parseFloat(i[f.key])||0;});});
  const o={};ALL_NUTR.forEach(f=>{o[f.key]=Math.round(t[f.key]/(srv||1)*10)/10;});
  o.kcal=Math.round(t.kcal/(srv||1));return o;
}
function autoNutr(amt,p,selectedUnit){
  const a=parseFloat(amt)||0;if(!p||a===0)return null;
  let grams=a;
  if(selectedUnit&&selectedUnit!==p.unit){
    const pu=(p.portionUnits||[]).find(u=>u.type===selectedUnit||u.label===selectedUnit);
    if(pu&&parseFloat(pu.grams)>0)grams=a*parseFloat(pu.grams);
  }
  const o={};ALL_NUTR.forEach(f=>{const k=f.key==="kcal"?"kcalPer100":`${f.key}Per100`;o[f.key]=f.key==="kcal"?Math.round((parseFloat(p[k])||0)*grams/100):Math.round((parseFloat(p[k])||0)*grams/100*10)/10;});
  return o;
}
function getEntries(wp,d,mt){return(wp[d]?.[mt]||[]).map(e=>typeof e==="object"?e:{rid:e,portions:1});}
function getWeekKey(off=0){const n=new Date();n.setDate(n.getDate()+off*7);const j=new Date(n.getFullYear(),0,1);const w=Math.ceil(((n-j)/86400000+j.getDay()+1)/7);return `${n.getFullYear()}-W${String(w).padStart(2,"0")}`;}
function weekLabel(k){const[y,w]=k.split("-W");return `Uke ${parseInt(w)}, ${y}`;}

function imgToBase64(file){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});}

function Badge({label,value,unit,color}){
  return <div style={{background:color,borderRadius:10,padding:"4px 9px",textAlign:"center",minWidth:52}}>

}
function NutrBadges({nutr,visibleNutr,compact=false}){
  const fields = compact
    ? ALL_NUTR.filter(f=>["kcal","fat","carbs","protein","salt"].includes(f.key))
    : ALL_NUTR;
  return <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
    {fields.map(f=>{
      if(visibleNutr && !visibleNutr[f.key]) return null;
      const v=nutr[f.key];
      if(v===undefined||v===null) return null;
      if(!compact && (v===0||v==="")) return null;
      return <Badge key={f.key} label={f.label} value={v??0} unit={f.unit} color={f.color}/>;
    })}
  </div>;
}

// ─── INGREDIENT AUTOCOMPLETE ─────────────────────────────────────────────────
let __dropdownSetter = null;
let __dropdownPicking = false; // prevents blur from closing before pick fires

function DropdownPortal(){
  const [state,setState]=useState(null);
  __dropdownSetter=setState;
  if(!state||!state.items.length)return null;
  const top=state.rect.bottom+window.scrollY+4;
  const left=state.rect.left+window.scrollX;
  const width=Math.max(state.rect.width,260);
  return <div style={{position:"absolute",top,left,width,background:P.card,border:`2px solid ${P.tealDk}`,borderRadius:12,zIndex:99999,boxShadow:"0 8px 32px rgba(0,0,0,0.2)",maxHeight:280,overflowY:"auto"}}>
    {state.items.map(p=>(
      <div key={p.id}
        onPointerDown={e=>{
          e.preventDefault();
          e.stopPropagation();
          __dropdownPicking=true;
          state.onPick(p);
          setState(null);
          setTimeout(()=>{__dropdownPicking=false;},300);
        }}
        style={{padding:"10px 14px",borderBottom:`1px solid ${P.border}`,display:"flex",gap:10,alignItems:"center",cursor:"pointer"}}
        onPointerEnter={e=>e.currentTarget.style.background=P.bg}
        onPointerLeave={e=>e.currentTarget.style.background="transparent"}
      >
        {p.image&&<img src={p.image} style={{width:36,height:36,borderRadius:8,objectFit:"cover",flexShrink:0}} alt=""/>}
        <div>
          <div style={{fontFamily:"Lato",fontSize:14,fontWeight:700,color:P.text}}>{p.brandName}</div>
          {p.genericTag&&<div style={{fontSize:11,color:P.tealDk}}>#{p.genericTag}</div>}
          <div style={{fontSize:10,color:P.muted}}>{p.kcalPer100||"—"} kcal · {p.proteinPer100||"—"}g P · {p.fatPer100||"—"}g F per 100{p.unit}</div>
        </div>
      </div>
    ))}
  </div>;
}

function IngInput({value,pantry,onChange,onSelect}){
  const inputRef=useRef();
  const matches=value.trim()
    ? pantry.filter(p=>p.brandName.toLowerCase().includes(value.toLowerCase())||(p.genericTag||"").toLowerCase().includes(value.toLowerCase()))
    : [];

  const updateDropdown=(currentMatches)=>{
    if(!inputRef.current||!currentMatches.length){__dropdownSetter&&__dropdownSetter(null);return;}
    const rect=inputRef.current.getBoundingClientRect();
    __dropdownSetter({items:currentMatches,rect,onPick:p=>{onSelect(p);}});
  };

  useEffect(()=>{
    if(matches.length>0) updateDropdown(matches);
    else __dropdownSetter&&__dropdownSetter(null);
  },[value]);

  return <input
    ref={inputRef}
    style={iSt}
    placeholder="Ingrediens…"
    value={value}
    onChange={e=>onChange(e.target.value)}
    onFocus={()=>updateDropdown(matches)}
    onBlur={()=>{
      setTimeout(()=>{
        if(!__dropdownPicking) __dropdownSetter&&__dropdownSetter(null);
      },350);
    }}
    autoComplete="off"
    autoCorrect="off"
    autoCapitalize="none"
    spellCheck={false}
  />;
}

// ─── BARCODE SCANNER ─────────────────────────────────────────────────────────
function BarcodeScanner({onResult,onClose}){
  const videoRef=useRef();const streamRef=useRef();const intRef=useRef();
  const [status,setStatus]=useState("Starter kamera…");const [scanning,setScanning]=useState(false);
  useEffect(()=>{
    let active=true;
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{if(!active){s.getTracks().forEach(t=>t.stop());return;}streamRef.current=s;if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play();}setStatus("Hold strekkoden foran kameraet");setScanning(true);}).catch(()=>setStatus("Kameratilgang nektet."));
    return()=>{active=false;if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());clearInterval(intRef.current);};
  },[]);
  useEffect(()=>{
    if(!scanning)return;
    if(!("BarcodeDetector"in window)){setStatus("Ikke støttet i denne nettleseren.");return;}
    const det=new window.BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
    intRef.current=setInterval(async()=>{if(!videoRef.current||videoRef.current.readyState<2)return;try{const c=await det.detect(videoRef.current);if(c.length>0){clearInterval(intRef.current);setStatus("Funnet! Henter info…");await lookup(c[0].rawValue);}}catch{}},400);
    return()=>clearInterval(intRef.current);
  },[scanning]);
  const lookup=async(bc)=>{
    try{const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${bc}.json`);const d=await r.json();
    if(d.status===1&&d.product){const pr=d.product;const n=pr.nutriments||{};onResult({brandName:pr.product_name||"",genericTag:(pr.categories_tags||[])[0]?.replace(/^(en:|no:)/,"")||"",unit:"g",kcalPer100:String(Math.round(n["energy-kcal_100g"]||0)),proteinPer100:String(Math.round((n.proteins_100g||0)*10)/10),fatPer100:String(Math.round((n.fat_100g||0)*10)/10),saturatedPer100:String(Math.round((n["saturated-fat_100g"]||0)*10)/10),carbsPer100:String(Math.round((n.carbohydrates_100g||0)*10)/10),sugarPer100:String(Math.round((n.sugars_100g||0)*10)/10),fiberPer100:String(Math.round((n.fiber_100g||0)*10)/10),saltPer100:String(Math.round((n.salt_100g||0)*10)/10),allergens:(pr.allergens_tags||[]).map(a=>a.replace(/^(en:|no:)/,"")),notes:pr.brands||""});}
    else{setStatus("Fant ikke produkt. Prøv manuelt.");setScanning(true);}}catch{setStatus("Nettverksfeil.");}
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:P.card,borderRadius:20,padding:20,maxWidth:420,width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h3 style={{margin:0,fontFamily:"Playfair Display",color:P.text,fontSize:18}}>📷 Skann strekkode</h3>
        <button onClick={onClose} style={{background:P.pink,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:14}}>✕</button>
      </div>
      <div style={{position:"relative",borderRadius:12,overflow:"hidden",background:"#000",marginBottom:12}}>
        <video ref={videoRef} style={{width:"100%",display:"block",maxHeight:260,objectFit:"cover"}} muted playsInline/>
        <div style={{position:"absolute",top:"50%",left:"20%",right:"20%",height:2,background:"rgba(77,182,172,0.8)",transform:"translateY(-50%)"}}/>
      </div>
      <div style={{fontFamily:"Lato",fontSize:13,color:P.muted,textAlign:"center",marginBottom:12}}>{status}</div>
      <button onClick={async()=>{const c=window.prompt("Skriv inn strekkode:");if(c){setStatus("Henter…");await lookup(c.trim());}}} style={{width:"100%",background:P.teal,border:"none",borderRadius:10,padding:"8px 0",cursor:"pointer",fontFamily:"Lato",fontSize:13,color:P.text}}>⌨ Skriv inn manuelt</button>
    </div>
  </div>;
}

          {ALLERGENS.map(a=><button key={a} onClick={()=>toggleAllergen(a)} style={{background:it.allergens.includes(a)?"#FFCDD2":P.bg,border:`1.5px solid ${it.allergens.includes(a)?"#EF9A9A":P.border}`,borderRadius:20,padding:"3px 10px",cursor:"pointer",fontFamily:"Lato",fontSize:11,color:P.text}}>{it.allergens.includes(a)?"⚠ ":""}{a}</button>)}
        </div>
      </div>

      <div style={{marginBottom:16}}><label style={lSt}>Notater</label><input style={iSt} value={it.notes} onChange={e=>setF("notes",e.target.value)} placeholder="F.eks. TINE, Oatly…"/></div>

      {/* Portion units */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:P.text,fontFamily:"Lato",marginBottom:4}}>Porsjonsstørrelser (valgfritt)</div>
        <div style={{fontSize:11,color:P.muted,fontFamily:"Lato",marginBottom:10}}>Definer hva f.eks. «1 stk» eller «1 pk» tilsvarer i gram. I oppskrifter kan du da skrive «2 stk» og næringen regnes ut automatisk.</div>

        {(it.portionUnits||[]).map((pu,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center",background:P.bg,borderRadius:10,padding:"8px 10px"}}>
            <div style={{flex:"0 0 auto"}}>
              <label style={lSt}>Type</label>
              <select style={{...iSt,width:90}} value={pu.type||""} onChange={e=>{const a=[...(it.portionUnits||[])];a[i]={...a[i],type:e.target.value,label:`1 ${e.target.value}`};setF("portionUnits",a);}}>
                <option value="">Velg…</option>
                {PORTION_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div style={{flex:1}}>
              <label style={lSt}>1 {pu.type||"?"} = gram</label>
              <input style={iSt} type="number" placeholder="150" value={pu.grams}
                onChange={e=>{const a=[...(it.portionUnits||[])];a[i]={...a[i],grams:e.target.value};setF("portionUnits",a);}}/>
            </div>
            <button onClick={()=>setF("portionUnits",(it.portionUnits||[]).filter((_,j)=>j!==i))}
              style={{background:P.pink,border:"none",borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:13,marginTop:14,flexShrink:0}}>×</button>
          </div>
        ))}

        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
          {PORTION_TYPES.filter(t=>!(it.portionUnits||[]).some(p=>p.type===t)).slice(0,6).map(t=>(
            <button key={t} onClick={()=>setF("portionUnits",[...(it.portionUnits||[]),{type:t,label:`1 ${t}`,grams:""}])}
              style={{background:P.teal,border:"none",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:P.text}}>
              + 1 {t}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={{background:P.border,border:"none",borderRadius:10,padding:"7px 18px",cursor:"pointer",fontFamily:"Lato",color:P.text}}>Avbryt</button>
        <button onClick={()=>it.brandName.trim()&&onSave(it)} style={{background:P.tealDk,border:"none",borderRadius:10,padding:"7px 22px",cursor:"pointer",fontFamily:"Lato",color:"#fff",fontWeight:700}}>Lagre</button>
      </div>
    </div>
  </>;
}

// ─── PANTRY TAB ───────────────────────────────────────────────────────────────
function PantryTab({uid,pantry,setPantry,visibleNutr}){
  const [form,setForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const [search,setSearch]=useState("");
  const [showFavOnly,setShowFavOnly]=useState(false);
  const [activeCategory,setActiveCategory]=useState("Alle");

  const save=async(it)=>{
    const data={...it};
    if(editing){
      await updateDoc(doc(db,"users",uid,"pantry",editing.id),data);
    } else {
      await addDoc(collection(db,"users",uid,"pantry"),data);
    }
    // onSnapshot in App handles the UI update automatically — no manual setPantry needed
    setForm(false);setEditing(null);
  };

  const del=async(id)=>{if(window.confirm("Slett?"))await deleteDoc(doc(db,"users",uid,"pantry",id));};

  const toggleFav=async(it)=>{
    await updateDoc(doc(db,"users",uid,"pantry",it.id),{favorite:!it.favorite});
  };

  if(form||editing)return <PantryForm initial={editing} onSave={save} onCancel={()=>{setForm(false);setEditing(null);}}/>;

  let filtered=pantry.filter(p=>!search||p.brandName.toLowerCase().includes(search.toLowerCase())||p.genericTag.toLowerCase().includes(search.toLowerCase()));
  if(showFavOnly)filtered=filtered.filter(p=>p.favorite);
  if(activeCategory!=="Alle")filtered=filtered.filter(p=>(p.pantryCategory||"Annet")===activeCategory);

  // Group by pantryCategory
  const usedCategories=["Alle",...PANTRY_CATEGORIES.filter(c=>pantry.some(p=>(p.pantryCategory||"Annet")===c))];
  const groups={};filtered.forEach(p=>{const t=p.pantryCategory||"Annet";if(!groups[t])groups[t]=[];groups[t].push(p);});

  const categoryIcons={"Meieri & egg":"🥛","Kjøtt & kylling":"🥩","Fisk & skalldyr":"🐟","Frukt & grønt":"🥦","Pålegg & frokost":"🍳","Tørrvarer":"🌾","Bakevarer & kjeks":"🍞","Søtt & godteri":"🍫","Krydder & saus":"🧂","Drikke":"🥤","Frysevarer":"❄️","Hermetikk":"🥫","Annet":"📦"};

  return <div>
    <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
      <input style={{...iSt,flex:1,minWidth:120}} placeholder="🔍 Søk…" value={search} onChange={e=>setSearch(e.target.value)}/>
      <button onClick={()=>setShowFavOnly(x=>!x)} style={{background:showFavOnly?"#FFF9C4":P.card,border:`1.5px solid ${showFavOnly?"#F9A825":P.border}`,borderRadius:10,padding:"6px 12px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:P.text}}>⭐ Favoritter</button>
      <button onClick={()=>setForm(true)} style={{background:P.tealDk,border:"none",borderRadius:10,padding:"7px 14px",cursor:"pointer",fontFamily:"Lato",color:"#fff",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>+ Ny vare</button>
    </div>

    {/* Category tabs */}
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
      {usedCategories.map(c=><button key={c} onClick={()=>setActiveCategory(c)} style={{background:activeCategory===c?P.tealDk:P.card,border:`1.5px solid ${activeCategory===c?P.tealDk:P.border}`,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:activeCategory===c?"#fff":P.text,whiteSpace:"nowrap"}}>
        {c==="Alle"?"🗂 Alle":categoryIcons[c]+" "+c}
      </button>)}
    </div>

    {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:P.muted}}><div style={{fontSize:44,marginBottom:10}}>🫙</div><div style={{fontFamily:"Playfair Display",fontSize:17}}>Ingenting her ennå</div></div>}

    {(activeCategory==="Alle"
      ? PANTRY_CATEGORIES.filter(c=>groups[c]?.length>0)
      : [activeCategory]
    ).map(cat=><div key={cat} style={{marginBottom:22}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
        <span style={{fontSize:18}}>{categoryIcons[cat]}</span>
        <span style={{fontFamily:"Playfair Display",fontSize:15,color:P.text,fontWeight:600}}>{cat}</span>
        <span style={{fontSize:11,color:P.muted,fontFamily:"Lato"}}>({groups[cat]?.length||0})</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8}}>
        {(groups[cat]||[]).map(it=><div key={it.id} style={{background:P.card,border:`1.5px solid ${P.teal}`,borderRadius:12,padding:"11px 13px",position:"relative"}}>
          <div style={{display:"flex",gap:10,marginBottom:7,alignItems:"flex-start"}}>
            {it.image&&<img src={it.image} style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}} alt=""/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"Lato",fontSize:13,fontWeight:700,color:P.text}}>{it.brandName}</div>
              {it.genericTag&&<div style={{fontSize:10,color:P.tealDk}}>#{it.genericTag}</div>}
              {it.notes&&<div style={{fontSize:10,color:P.muted}}>{it.notes}</div>}
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              <button onClick={()=>toggleFav(it)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,lineHeight:1}}>{it.favorite?"⭐":"☆"}</button>
              <button onClick={()=>setEditing(it)} style={{background:P.yellow,border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✎</button>
              <button onClick={()=>del(it.id)} style={{background:P.pink,border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✕</button>
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:it.allergens?.length>0?7:0}}>
            {ALL_NUTR.map(f=>{const pk=f.key==="kcal"?"kcalPer100":`${f.key}Per100`;const v=it[pk];if(!visibleNutr[f.key])return null;if(!v||v==="0"||v==="")return null;return <Badge key={f.key} label={f.label} value={v||0} unit={`${f.unit}/100${it.unit}`} color={f.color}/>;})}</div>
          {it.allergens?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{it.allergens.map(a=><span key={a} style={{background:"#FFCDD2",border:"1px solid #EF9A9A",borderRadius:20,padding:"1px 8px",fontSize:10,color:"#b71c1c",fontFamily:"Lato"}}>⚠ {a}</span>)}</div>}
        </div>)}
      </div>
    </div>)}
  </div>;
}

const PORTION_TYPES = ["stk","pk","skive","bit","ts","ss","flaske","neve","klype","dl","ml","bukett","fedd","sprayer","porsjon"];

// Isolated so parent re-renders don't cause jumping
function ServingsField({initial,onCommit}){
  const ref=useRef();
  return <div>
    <label style={lSt}>Porsjoner</label>
    <input ref={ref} style={{...iSt,width:80}} type="text" inputMode="numeric"
      defaultValue={String(initial||1)}
      onKeyDown={e=>{if(!/[0-9]|Backspace|Delete|ArrowLeft|ArrowRight|Tab/.test(e.key))e.preventDefault();}}
      onChange={e=>{onCommit(parseInt(e.target.value)||1);}}
      onBlur={e=>{if(!e.target.value||parseInt(e.target.value)<1)e.target.value="1";onCommit(parseInt(e.target.value)||1);}}
    />
  </div>;
}


function RecipeForm({initial,pantry,onSave,onCancel}){
  const [r,setR]=useState(()=>initial?JSON.parse(JSON.stringify(initial)):emptyRecipe());
  const setF=(k,v)=>setR(x=>({...x,[k]:v}));
  const setIng=(i,k,v)=>{const a=[...r.ingredients];a[i]={...a[i],[k]:v};setF("ingredients",a);};
  const selPantry=(i,p)=>{
    const a=[...r.ingredients];
    const au=autoNutr(a[i].amount,p,a[i].selectedUnit);
    a[i]={...a[i],name:p.brandName,unit:p.unit,pantryId:p.id,selectedUnit:p.unit};
    if(au)Object.keys(au).forEach(k=>{a[i][k]=String(au[k]);});
    setF("ingredients",a);
  };
  const handleAmt=(i,v)=>{
    const a=[...r.ingredients];a[i]={...a[i],amount:v};
    if(a[i].pantryId){
      const p=pantry.find(x=>x.id===a[i].pantryId);
      const au=autoNutr(v,p,a[i].selectedUnit);
      if(au)Object.keys(au).forEach(k=>{a[i][k]=String(au[k]);});
    }
    setF("ingredients",a);
  };
  const handleUnit=(i,v)=>{
    const a=[...r.ingredients];a[i]={...a[i],selectedUnit:v,unit:v};
    if(a[i].pantryId&&a[i].amount){
      const p=pantry.find(x=>x.id===a[i].pantryId);
      const au=autoNutr(a[i].amount,p,v);
      if(au)Object.keys(au).forEach(k=>{a[i][k]=String(au[k]);});
    }
    setF("ingredients",a);
  };
  const nutr=calcNutr(r.ingredients,r.servings||1);
  const imgRef=useRef();
  const [saveErr,setSaveErr]=useState(false);

  const handleSave=()=>{
    if(!r.name.trim()){setSaveErr(true);return;}
    onSave(r);
  };

  return <div style={{background:P.card,borderRadius:16,padding:24,border:`1px solid ${P.border}`}}>
    <h3 style={{margin:"0 0 18px",fontFamily:"Playfair Display",color:P.text,fontSize:20}}>{initial?"Rediger oppskrift":"Ny oppskrift"}</h3>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
      <div style={{gridColumn:"1/-1"}}>
        <label style={lSt}>Navn</label>
        <input style={{...iSt,border:`1.5px solid ${saveErr?"#ef5350":P.border}`}} value={r.name} onChange={e=>{setF("name",e.target.value);setSaveErr(false);}} placeholder="F.eks. Kyllingsuppe"/>
        {saveErr&&<div style={{fontSize:11,color:"#ef5350",fontFamily:"Lato",marginTop:3}}>Skriv inn navn på oppskriften</div>}
      </div>
      <div style={{gridColumn:"1/-1"}}>
        <label style={lSt}>Måltidstype (velg én eller flere)</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:2}}>
          {MEAL_TYPES.map(m=>{
            const sel=(r.mealTypes||[r.mealType]).includes(m);
            return <button key={m} type="button" onClick={()=>{
              const cur=r.mealTypes||(r.mealType?[r.mealType]:[]);
              const next=sel?cur.filter(x=>x!==m):[...cur,m];
              setF("mealTypes",next.length?next:cur);
            }} style={{background:sel?MC[m]?.bg||P.purple:P.bg,border:`1.5px solid ${sel?MC[m]?.border||P.purpleDk:P.border}`,borderRadius:20,padding:"5px 13px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:P.text,fontWeight:sel?700:400}}>
              {MC[m]?.icon} {m}
            </button>;
          })}
        </div>
      </div>
      <div><label style={lSt}>Kategori</label><select style={iSt} value={r.category} onChange={e=>setF("category",e.target.value)}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
      <div><label style={lSt}>Varm / kald</label><select style={iSt} value={r.tempType||"Varmmat"} onChange={e=>setF("tempType",e.target.value)}>{TEMP_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
      <ServingsField initial={r.servings} onCommit={v=>setF("servings",v)}/>
    </div>

    {/* Storage info */}
    <div style={{background:P.bg,borderRadius:12,padding:"12px 14px",marginBottom:18}}>
      <div style={{fontSize:12,fontWeight:700,color:P.text,fontFamily:"Lato",marginBottom:10}}>Oppbevaring</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><label style={lSt}>Holder seg i kjøleskap (dager)</label><input style={iSt} type="number" placeholder="—" value={r.fridgeDays} onChange={e=>setF("fridgeDays",e.target.value)}/></div>
        <div><label style={lSt}>Kan fryses i (dager)</label><input style={{...iSt,opacity:r.canFreeze?1:0.5}} type="number" placeholder="—" disabled={!r.canFreeze} value={r.freezeDays} onChange={e=>setF("freezeDays",e.target.value)}/></div>
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:"Lato",fontSize:13,color:P.text}}>
          <input type="checkbox" checked={r.canFreeze} onChange={e=>setF("canFreeze",e.target.checked)} style={{width:16,height:16}}/> Kan fryses
        </label>
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:"Lato",fontSize:13,color:P.text}}>
          <input type="checkbox" checked={r.needsCold} onChange={e=>setF("needsCold",e.target.checked)} style={{width:16,height:16}}/> Må oppbevares kjølig
        </label>
      </div>
    </div>

    {/* Image */}
    <div style={{marginBottom:18}}>
      <label style={lSt}>Bilde (valgfritt)</label>
      <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{if(e.target.files[0])setF("image",await imgToBase64(e.target.files[0]));}}/>
      {r.image?<div style={{position:"relative",display:"inline-block"}}>
        <img src={r.image} alt="" style={{width:"100%",maxWidth:320,maxHeight:160,objectFit:"cover",borderRadius:12,display:"block",border:`1px solid ${P.border}`}}/>
        <button onClick={()=>setF("image",null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.55)",border:"none",borderRadius:"50%",width:26,height:26,cursor:"pointer",color:"#fff",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>:<div style={{display:"flex",gap:8}}>
        <button onClick={()=>{imgRef.current.removeAttribute("capture");imgRef.current.click();}} style={{background:P.purple,border:`1.5px dashed ${P.purpleDk}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:P.text}}>🖼 Bildebibliotek</button>
        <button onClick={()=>{imgRef.current.setAttribute("capture","environment");imgRef.current.click();}} style={{background:P.teal,border:`1.5px dashed ${P.tealDk}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:P.text}}>📷 Ta bilde</button>
      </div>}
    </div>

    {/* Ingredients — redesigned so dropdown isn't clipped */}
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <h4 style={{margin:0,fontFamily:"Playfair Display",color:P.text}}>Ingredienser</h4>
        <button onClick={()=>setF("ingredients",[...r.ingredients,emptyIng()])} style={{background:P.green,border:"none",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontFamily:"Lato",color:P.text,fontSize:12}}>+ Legg til</button>
      </div>

      {/* Header row */}
      <div style={{display:"flex",gap:4,marginBottom:4,minWidth:0}}>
        <div style={{flex:"0 0 180px",fontSize:10,color:P.muted,fontFamily:"Lato"}}>Ingrediens</div>
        <div style={{overflowX:"auto",flex:1,display:"flex",gap:4}}>
          {["Mengde","Enhet","Kcal","Fett","M.fett","Karbo","Sukker","Protein","Salt","Fiber",""].map((h,i)=>(
            <div key={i} style={{flex:"0 0 68px",fontSize:10,color:P.muted,fontFamily:"Lato"}}>{h}</div>
          ))}
        </div>
      </div>

      {r.ingredients.map((ing,idx)=>{
        const linked=ing.pantryId?pantry.find(p=>p.id===ing.pantryId):null;
        return <div key={idx} style={{marginBottom:6}}>
          <div style={{display:"flex",gap:4,alignItems:"flex-start"}}>
            {/* Ingredient name — NOT inside overflow:auto so dropdown shows */}
            <div style={{flex:"0 0 180px",position:"relative",zIndex:100+idx}}>
              <IngInput value={ing.name} pantry={pantry}
                onChange={v=>{const a=[...r.ingredients];a[idx]={...a[idx],name:v,pantryId:v?a[idx].pantryId:null};setF("ingredients",a);}}
                onSelect={p=>selPantry(idx,p)}/>
            </div>
            {/* Scrollable numeric columns */}
            <div style={{overflowX:"auto",flex:1,display:"flex",gap:4}}>
              <input style={{...iSt,flex:"0 0 68px"}} placeholder="100" value={ing.amount} onChange={e=>handleAmt(idx,e.target.value)}/>
              {(()=>{
                const pp=ing.pantryId?pantry.find(x=>x.id===ing.pantryId):null;
                const puOptions=pp?.portionUnits?.filter(u=>(u.type||u.label)&&u.grams)||[];
                if(puOptions.length>0){
                  return <select style={{...iSt,flex:"0 0 68px"}} value={ing.selectedUnit||pp.unit} onChange={e=>handleUnit(idx,e.target.value)}>
                    <option value={pp.unit}>{pp.unit}</option>
                    {puOptions.map(u=><option key={u.type||u.label} value={u.type||u.label}>{u.type||u.label}</option>)}
                  </select>;
                }
                return <input style={{...iSt,flex:"0 0 68px"}} placeholder="g" value={ing.unit} onChange={e=>setIng(idx,"unit",e.target.value)}/>;
              })()}
              {["kcal","fat","saturated","carbs","sugar","protein","salt","fiber"].map(k=>(
                <input key={k} style={{...iSt,flex:"0 0 68px",background:linked?"#EEF8EE":P.card}} type="number" placeholder="—" value={ing[k]} onChange={e=>setIng(idx,k,e.target.value)}/>
              ))}
              <button onClick={()=>setF("ingredients",r.ingredients.filter((_,j)=>j!==idx))} style={{flex:"0 0 28px",background:P.pink,border:"none",borderRadius:6,cursor:"pointer",fontSize:13}}>×</button>
            </div>
          </div>
          {linked&&<div style={{fontSize:10,color:P.tealDk,fontFamily:"Lato",marginTop:2,marginLeft:2}}>🔗 #{linked.genericTag}</div>}
        </div>;
      })}

      <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:P.muted,fontFamily:"Lato"}}>Per porsjon:</span>
        <NutrBadges nutr={nutr} visibleNutr={Object.fromEntries(ALL_NUTR.map(f=>[f.key,true]))}/>
      </div>
    </div>

    {/* Steps */}
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><h4 style={{margin:0,fontFamily:"Playfair Display",color:P.text}}>Fremgangsmåte</h4><button onClick={()=>setF("steps",[...r.steps,""])} style={{background:P.blue,border:"none",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontFamily:"Lato",color:P.text,fontSize:12}}>+ Steg</button></div>
      {r.steps.map((s,i)=><div key={i} style={{display:"flex",gap:7,marginBottom:5,alignItems:"flex-start"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:6,flexShrink:0}}>
          <button onClick={()=>{if(i===0)return;const a=[...r.steps];[a[i-1],a[i]]=[a[i],a[i-1]];setF("steps",a);}} disabled={i===0} style={{background:i===0?"#eee":P.purple,border:"none",borderRadius:4,width:20,height:18,cursor:i===0?"default":"pointer",fontSize:10,color:i===0?P.muted:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>▲</button>

function WeekPlan({recipes,weekPlan,setWeekPlan,addToPlanTarget,setAddToPlanTarget,visibleNutr}){
  const [day,setDay]=useState("Mandag");
  const addToDay=(d,mt,id)=>setWeekPlan(wp=>{const u={...wp};u[d]={...u[d]};u[d][mt]=[...(u[d][mt]||[]),{rid:id,portions:1}];return u;});
  const removeFromDay=(d,mt,i)=>setWeekPlan(wp=>{const u={...wp};u[d]={...u[d]};u[d][mt]=u[d][mt].filter((_,j)=>j!==i);return u;});
  const setPortions=(d,mt,i,val)=>setWeekPlan(wp=>{const u={...wp};u[d]={...u[d]};const e=[...u[d][mt]];const en=typeof e[i]==="object"?{...e[i]}:{rid:e[i],portions:1};en.portions=Math.max(1,parseInt(val)||1);e[i]=en;u[d][mt]=e;return u;});
  const dayNutr=d=>{const t={};ALL_NUTR.forEach(f=>{t[f.key]=0;});MEAL_TYPES.forEach(mt=>getEntries(weekPlan,d,mt).forEach(({rid})=>{const r=recipes.find(x=>x.id===rid);if(r){const n=calcNutr(r.ingredients,r.servings);ALL_NUTR.forEach(f=>{t[f.key]+=n[f.key]||0;});}}));const o={};ALL_NUTR.forEach(f=>{o[f.key]=Math.round(t[f.key]*10)/10;});o.kcal=Math.round(t.kcal);return o;};
  useEffect(()=>{if(addToPlanTarget){const mt=(addToPlanTarget.mealTypes||[addToPlanTarget.mealType])[0]||"Middag";addToDay(day,mt,addToPlanTarget.id);setAddToPlanTarget(null);}},[addToPlanTarget]);

  return <div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
      {DAYS.map(d=>{const dn=dayNutr(d);return <button key={d} onClick={()=>setDay(d)} style={{background:day===d?P.purpleDk:P.card,border:`1.5px solid ${day===d?P.purpleDk:P.border}`,borderRadius:10,padding:"5px 10px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:day===d?"#fff":P.text}}><div>{d.slice(0,3)}</div><div style={{fontSize:9,opacity:0.8}}>{visibleNutr.kcal?dn.kcal+" kcal":""}</div></button>;})}
    </div>
    <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h3 style={{margin:0,fontFamily:"Playfair Display",color:P.text}}>{day}</h3>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
          <NutrBadges nutr={dayNutr(day)} visibleNutr={visibleNutr} compact={true}/>
          <div style={{fontSize:10,color:P.muted,fontFamily:"Lato"}}>Næring per porsjon for deg</div>
        </div>
      </div>
      {MEAL_TYPES.map(mt=>{const mc=MC[mt];const entries=getEntries(weekPlan,day,mt);return <div key={mt} style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:600,color:P.text,fontFamily:"Lato",marginBottom:5}}>{mc.icon} {mt}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {entries.map(({rid,portions},i)=>{const r=recipes.find(x=>x.id===rid);if(!r)return null;const n=calcNutr(r.ingredients,r.servings);return <div key={i} style={{background:mc.bg,border:`1px solid ${mc.border}30`,borderRadius:10,padding:"5px 10px",display:"flex",gap:6,alignItems:"center",fontSize:11,fontFamily:"Lato",color:P.text}}>
            <span style={{fontWeight:600}}>{r.name}</span>
            {visibleNutr.kcal&&<span style={{color:P.muted,fontSize:10}}>{n.kcal} kcal</span>}
            <div style={{display:"flex",alignItems:"center",gap:3,background:"rgba(0,0,0,0.06)",borderRadius:7,padding:"1px 4px"}}>
              <button onClick={()=>setPortions(day,mt,i,portions-1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:P.text,padding:"0 2px"}}>−</button>
              <span style={{fontSize:11,minWidth:14,textAlign:"center"}}>{portions}</span>
              <button onClick={()=>setPortions(day,mt,i,portions+1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:P.text,padding:"0 2px"}}>+</button>
              <span style={{fontSize:9,color:P.muted}}>porsj.</span>
            </div>
            <button onClick={()=>removeFromDay(day,mt,i)} style={{background:"none",border:"none",cursor:"pointer",color:P.muted,fontSize:13,padding:0}}>×</button>
          </div>;})}
          <AddMealBtn recipes={recipes.filter(r=>(r.mealTypes||[r.mealType]).includes(mt))} onAdd={id=>addToDay(day,mt,id)}/>
        </div>
      </div>;})}
    </div>
  </div>;
}

// ─── SHOPPING LIST ────────────────────────────────────────────────────────────
function ShoppingList({recipes,weekPlan,pantry}){
  const buildList=()=>{const items={};DAYS.forEach(d=>MEAL_TYPES.forEach(mt=>getEntries(weekPlan,d,mt).forEach(({rid,portions})=>{const r=recipes.find(x=>x.id===rid);if(!r)return;const mult=(portions||1)/(r.servings||1);r.ingredients.forEach(ing=>{if(!ing.name.trim())return;const pi=ing.pantryId?pantry.find(p=>p.id===ing.pantryId):null;let amt=parseFloat(ing.amount)||0;let unit=ing.unit;// Convert portionUnit to grams for shopping list
if(ing.selectedUnit&&pi&&ing.selectedUnit!==pi.unit){const pu=(pi.portionUnits||[]).find(u=>u.type===ing.selectedUnit||u.label===ing.selectedUnit);if(pu&&parseFloat(pu.grams)>0){amt=amt*parseFloat(pu.grams);unit=pi.unit||"g";}}const key=`${ing.name.toLowerCase().trim()}__${unit.toLowerCase().trim()}`;if(!items[key]){items[key]={name:ing.name,unit,amount:0,pantryItem:pi};}items[key].amount+=amt*mult;});}))); return Object.values(items).sort((a,b)=>a.name.localeCompare(b.name,"no"));};
  const list=buildList();const [checked,setChecked]=useState({});
  return <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:20}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><h3 style={{margin:0,fontFamily:"Playfair Display",color:P.text}}>🛒 Handleliste for uka</h3><span style={{fontSize:11,color:P.muted,fontFamily:"Lato"}}>{list.length} varer</span></div>
    {list.length===0&&<div style={{color:P.muted,fontFamily:"Lato",fontSize:13}}>Ingen måltider i ukeplanen ennå.</div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
      {list.map(it=>{const k=it.name+it.unit;return <div key={k} onClick={()=>setChecked(c=>({...c,[k]:!c[k]}))} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",background:checked[k]?"#F0F0F0":P.bg,borderRadius:10,cursor:"pointer",opacity:checked[k]?0.5:1,border:`1px solid ${P.border}`}}>
        <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${P.greenDk}`,background:checked[k]?P.greenDk:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{checked[k]&&<span style={{color:"#fff",fontSize:9}}>✓</span>}</div>
        <div style={{flex:1}}><div style={{fontFamily:"Lato",fontSize:13,color:P.text,textDecoration:checked[k]?"line-through":"none",fontWeight:600}}>{it.name}</div>{it.pantryItem?.genericTag&&<div style={{fontSize:9,color:P.tealDk}}>#{it.pantryItem.genericTag}</div>}</div>
        <span style={{fontFamily:"Lato",fontSize:12,color:P.muted,fontWeight:700,whiteSpace:"nowrap"}}>{it.amount%1===0?it.amount:Math.round(it.amount*10)/10} {it.unit}</span>
      </div>;})}
    </div>
  </div>;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function StatsTab({recipes,weekPlan,weekHistory,visibleNutr}){
  const [off,setOff]=useState(0);
  const allKeys=[getWeekKey(0),...Object.keys(weekHistory)].filter((v,i,a)=>a.indexOf(v)===i).sort().reverse();
  const key=allKeys[off]||getWeekKey(0);
  const plan=key===getWeekKey(0)?weekPlan:(weekHistory[key]||emptyWeekPlan());
  const dayNutr=d=>{const t={};ALL_NUTR.forEach(f=>{t[f.key]=0;});MEAL_TYPES.forEach(mt=>getEntries(plan,d,mt).forEach(({rid})=>{const r=recipes.find(x=>x.id===rid);if(r){const n=calcNutr(r.ingredients,r.servings);ALL_NUTR.forEach(f=>{t[f.key]+=n[f.key]||0;});}}));return t;};
  const wt=()=>{const t={};ALL_NUTR.forEach(f=>{t[f.key]=0;});DAYS.forEach(d=>{const dn=dayNutr(d);ALL_NUTR.forEach(f=>{t[f.key]+=dn[f.key]||0;});});const o={};ALL_NUTR.forEach(f=>{o[f.key]=Math.round(t[f.key]*10)/10;});o.kcal=Math.round(t.kcal);return o;};
  const maxKcal=Math.max(...DAYS.map(d=>dayNutr(d).kcal||0),1);
  const kcalColor=k=>{if(k===0)return P.border;if(k<1200)return"#BBDEFB";if(k<=2500)return P.greenDk;return"#FFAB91";};
  const totals=wt();
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,background:P.card,borderRadius:14,padding:"12px 16px",border:`1px solid ${P.border}`}}>
      <button onClick={()=>setOff(o=>Math.min(o+1,allKeys.length-1))} disabled={off>=allKeys.length-1} style={{background:P.purple,border:"none",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:14,opacity:off>=allKeys.length-1?0.4:1}}>‹</button>
      <div style={{flex:1,textAlign:"center"}}><div style={{fontFamily:"Playfair Display",fontSize:17,color:P.text}}>{weekLabel(key)}</div>{off===0&&<div style={{fontSize:11,color:P.tealDk,fontFamily:"Lato"}}>Inneværende uke</div>}</div>
      <button onClick={()=>setOff(o=>Math.max(o-1,0))} disabled={off===0} style={{background:P.purple,border:"none",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:14,opacity:off===0?0.4:1}}>›</button>
    </div>
    {visibleNutr.kcal&&<div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16,marginBottom:14}}>
      <div style={{fontFamily:"Playfair Display",fontSize:15,color:P.text,marginBottom:14}}>Kalorier per dag</div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:120}}>
        {DAYS.map(d=>{const dn=dayNutr(d);const h=Math.round((dn.kcal/maxKcal)*100);return <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:10,color:P.muted,fontFamily:"Lato"}}>{dn.kcal||""}</div><div style={{width:"100%",height:`${h}%`,minHeight:dn.kcal?4:0,background:kcalColor(dn.kcal),borderRadius:"4px 4px 0 0"}}/><div style={{fontSize:10,color:P.text,fontFamily:"Lato"}}>{d.slice(0,3)}</div></div>;})}
      </div>
    </div>}
    <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16,marginBottom:14}}>
      <div style={{fontFamily:"Playfair Display",fontSize:15,color:P.text,marginBottom:12}}>Totalt for uka</div>
      <NutrBadges nutr={totals} visibleNutr={visibleNutr}/>
      {visibleNutr.kcal&&<div style={{marginTop:10,fontSize:11,color:P.muted,fontFamily:"Lato"}}>Snitt per dag: {Math.round(totals.kcal/7)} kcal{visibleNutr.protein?` · ${Math.round(totals.protein/7*10)/10}g protein`:""}</div>}
    </div>
    <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16}}>
      <div style={{fontFamily:"Playfair Display",fontSize:15,color:P.text,marginBottom:12}}>Dag for dag</div>
      {DAYS.map(d=>{const dn=dayNutr(d);const meals=MEAL_TYPES.flatMap(mt=>getEntries(plan,d,mt).map(({rid})=>{const r=recipes.find(x=>x.id===rid);return r?{name:r.name,mt}:null;})).filter(Boolean);return <div key={d} style={{padding:"8px 0",borderBottom:`1px solid ${P.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:meals.length?5:0}}>
          <div style={{fontFamily:"Lato",fontSize:13,fontWeight:700,color:meals.length?P.text:P.muted}}>{d}</div>
          {meals.length>0&&<div style={{display:"flex",gap:5}}>{visibleNutr.kcal&&<Badge label="Kcal" value={Math.round(dn.kcal)} unit="" color={P.yellow}/>}{visibleNutr.protein&&<Badge label="P" value={Math.round(dn.protein*10)/10} unit="g" color={P.green}/>}{visibleNutr.carbs&&<Badge label="K" value={Math.round(dn.carbs*10)/10} unit="g" color={P.blue}/>}</div>}
          {meals.length===0&&<div style={{fontSize:11,color:P.muted,fontFamily:"Lato"}}>Ingen måltider</div>}
        </div>
        {meals.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{meals.map((m,i)=><span key={i} style={{background:MC[m.mt]?.bg||P.bg,borderRadius:8,padding:"2px 8px",fontSize:11,fontFamily:"Lato",color:P.text}}>{m.name}</span>)}</div>}
      </div>;})}
    </div>
  </div>;
}

function AuthScreen(){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    setErr("");
    if(!email||!pw){setErr("Fyll inn e-post og passord.");return;}
    if(mode==="register"&&pw!==pw2){setErr("Passordene er ikke like.");return;}
    if(mode==="register"&&pw.length<6){setErr("Passordet må være minst 6 tegn.");return;}
    setLoading(true);
    try{if(mode==="register")await createUserWithEmailAndPassword(auth,email,pw);else await signInWithEmailAndPassword(auth,email,pw);}
    catch(e){const m={"auth/email-already-in-use":"E-posten er allerede i bruk.","auth/invalid-email":"Ugyldig e-postadresse.","auth/wrong-password":"Feil passord.","auth/user-not-found":"Ingen bruker med denne e-posten.","auth/invalid-credential":"Feil e-post eller passord."};setErr(m[e.code]||e.message);}

      {mode==="register"&&<div style={{marginBottom:14}}><label style={lSt}>Gjenta passord</label><input style={iSt} type="password" placeholder="Skriv passordet én gang til" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>}

      <button onClick={submit} disabled={loading} style={{width:"100%",background:P.greenDk,border:"none",borderRadius:12,padding:"11px 0",cursor:"pointer",fontFamily:"Lato",color:"#fff",fontWeight:700,fontSize:14,marginBottom:10,opacity:loading?0.7:1}}>{loading?"Laster…":mode==="login"?"Logg inn":"Opprett konto"}</button>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{flex:1,height:1,background:P.border}}/><span style={{fontSize:11,color:P.muted}}>eller</span><div style={{flex:1,height:1,background:P.border}}/></div>
      <button onClick={async()=>{setErr("");setLoading(true);try{await signInWithPopup(auth,gProvider);}catch(e){setErr("Google-innlogging feilet.");}setLoading(false);}} style={{width:"100%",background:P.card,border:`1.5px solid ${P.border}`,borderRadius:12,padding:"10px 0",cursor:"pointer",fontFamily:"Lato",color:P.text,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:18}}>

function ProfileTab({user,profile,setProfile,recipes,visibleNutr,setVisibleNutr}){
  const [editing,setEditing]=useState(false);
  const [gender,setGender]=useState(profile?.gender||"");
  const [displayName,setDisplayName]=useState(user.displayName||"");
  const [username,setUsername]=useState(profile?.username||"");
  const [usernameErr,setUsernameErr]=useState("");
  const [localAvatar,setLocalAvatar]=useState(profile?.avatarBase64||null);
  const memberDate=profile?.createdAt?new Date(profile.createdAt).toLocaleDateString("nb-NO",{year:"numeric",month:"long",day:"numeric"}):"—";
  const avatarRef=useRef();

  const validateUsername=(v)=>{
    if(!v)return "";
    if(!/^[a-zA-Z0-9._-]{2,30}$/.test(v))return "Kun bokstaver, tall, punktum, bindestrek og understrek. 2–30 tegn.";
    return "";
  };

  const save=async()=>{
    const err=validateUsername(username);
    if(err){setUsernameErr(err);return;}
    const updated={...profile,gender,displayName,username,avatarBase64:localAvatar};
    await setDoc(doc(db,"users",user.uid),updated,{merge:true});
    try{await updateProfile(user,{displayName});}catch{}
    setProfile(updated);
    setEditing(false);
    setUsernameErr("");
  };

  const toggleNutr=async(key)=>{
    const updated={...visibleNutr,[key]:!visibleNutr[key]};
    setVisibleNutr(updated);
    await setDoc(doc(db,"users",user.uid),{visibleNutr:updated},{merge:true});
  };

  const avatar = localAvatar || user.photoURL;

          <input ref={avatarRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{if(e.target.files[0]){const b=await imgToBase64(e.target.files[0]);setLocalAvatar(b);}}}/>
        </div>
        <div>
          <div style={{fontFamily:"Playfair Display",fontSize:17,color:P.text}}>{user.displayName||profile?.displayName||user.email}</div>
          {profile?.username&&<div style={{fontSize:13,color:P.tealDk,fontFamily:"Lato",fontWeight:700}}>@{profile.username}</div>}
          <div style={{fontSize:12,color:P.muted,fontFamily:"Lato"}}>{user.email}</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <div style={{background:P.bg,borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,color:P.muted,fontFamily:"Lato"}}>Medlem siden</div><div style={{fontFamily:"Lato",fontSize:13,fontWeight:700,color:P.text,marginTop:3}}>{memberDate}</div></div>
        <div style={{background:P.bg,borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,color:P.muted,fontFamily:"Lato"}}>Antall oppskrifter</div><div style={{fontFamily:"Lato",fontSize:22,fontWeight:700,color:P.tealDk,marginTop:3}}>{recipes.length}</div></div>
      </div>

      {editing?<div>
        <div style={{marginBottom:12}}><label style={lSt}>Kallenavn</label><input style={iSt} value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="Ditt navn"/></div>
        <div style={{marginBottom:12}}>
          <label style={lSt}>Brukernavn</label>
          <div style={{display:"flex",alignItems:"center",gap:0,border:`1.5px solid ${usernameErr?"#ef5350":P.border}`,borderRadius:8,overflow:"hidden",background:P.card}}>
            <span style={{padding:"6px 8px",fontFamily:"Lato",fontSize:13,color:P.tealDk,fontWeight:700,background:P.teal,borderRight:`1px solid ${P.border}`}}>@</span>
            <input style={{...iSt,border:"none",borderRadius:0,flex:1}} value={username}
              onChange={e=>{const v=e.target.value.replace(/\s/g,"");setUsername(v);setUsernameErr(validateUsername(v));}}
              placeholder="ola.nordmann" autoCapitalize="none" autoCorrect="off" spellCheck={false}/>
          </div>
          {usernameErr&&<div style={{fontSize:11,color:"#ef5350",fontFamily:"Lato",marginTop:3}}>{usernameErr}</div>}
          <div style={{fontSize:10,color:P.muted,fontFamily:"Lato",marginTop:3}}>Bokstaver, tall, punktum, bindestrek, understrek. Vises som «Delt av @brukernavn» på oppskrifter.</div>
        </div>
        <div style={{marginBottom:12}}><label style={lSt}>Kjønn</label>
          <select style={iSt} value={gender} onChange={e=>setGender(e.target.value)}><option value="">— Velg —</option>{GENDERS.map(g=><option key={g}>{g}</option>)}</select>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>

      <div style={{fontFamily:"Playfair Display",fontSize:16,color:P.text,marginBottom:14}}>Næringsverdier — vis/skjul</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {ALL_NUTR.map(f=><label key={f.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",padding:"6px 0",borderBottom:`1px solid ${P.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:14,height:14,borderRadius:4,background:f.color,border:`1px solid ${P.border}`}}/>
            <span style={{fontFamily:"Lato",fontSize:14,color:P.text}}>{f.label}</span>
          </div>
          <div style={{position:"relative",width:44,height:24}} onClick={()=>toggleNutr(f.key)}>
            <div style={{position:"absolute",inset:0,borderRadius:12,background:visibleNutr[f.key]?P.greenDk:P.border,transition:"background 0.2s"}}/>
            <div style={{position:"absolute",top:2,left:visibleNutr[f.key]?22:2,width:20,height:20,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.2)",transition:"left 0.2s"}}/>
          </div>
        </label>)}
      </div>
    </div>

    <button onClick={()=>signOut(auth)} style={{width:"100%",background:P.pink,border:"none",borderRadius:12,padding:"11px 0",cursor:"pointer",fontFamily:"Lato",color:P.text,fontWeight:700,fontSize:14}}>Logg ut</button>
  </div>;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const DEFAULT_VISIBLE_NUTR = Object.fromEntries(ALL_NUTR.map(f=>[f.key,true]));

function App(){
  const [user,setUser]=useState(undefined);
  const [profile,setProfile]=useState(null);
  const [recipes,setRecipes]=useState([]);
  const [weekPlan,setWeekPlan]=useState(emptyWeekPlan());
  const [pantry,setPantry]=useState([]);
  const [weekHistory,setWeekHistory]=useState({});
  const [visibleNutr,setVisibleNutr]=useState(DEFAULT_VISIBLE_NUTR);
  const [tab,setTab]=useState("recipes");
  const [showForm,setShowForm]=useState(false);
  const [editingRecipe,setEditingRecipe]=useState(null);
  const [addToPlanTarget,setAddToPlanTarget]=useState(null);
  const [filterMeal,setFilterMeal]=useState("Alle");
  const [filterCat,setFilterCat]=useState("Alle");
  const [filterSort,setFilterSort]=useState("Standard");
  const [search,setSearch]=useState("");
  const [showFavOnly,setShowFavOnly]=useState(false);

  useEffect(()=>{
    return onAuthStateChanged(auth,async u=>{
      setUser(u||null);
      if(u){
        const snap=await getDoc(doc(db,"users",u.uid));
        if(snap.exists()){
          const d=snap.data();
          setProfile(d);
          if(d.visibleNutr) setVisibleNutr({...DEFAULT_VISIBLE_NUTR,...d.visibleNutr});
        } else {
          const p={email:u.email,createdAt:new Date().toISOString(),gender:""};
          await setDoc(doc(db,"users",u.uid),p);
          setProfile(p);
        }
      } else {setProfile(null);setRecipes([]);setPantry([]);setWeekPlan(emptyWeekPlan());setWeekHistory({});}
    });
  },[]);

  useEffect(()=>{if(!user)return;return onSnapshot(query(collection(db,"users",user.uid,"recipes")),snap=>{setRecipes(snap.docs.map(d=>({...d.data(),id:d.id})));});},[user]);
  useEffect(()=>{if(!user)return;return onSnapshot(query(collection(db,"users",user.uid,"pantry")),snap=>{setPantry(snap.docs.map(d=>({...d.data(),id:d.id})));});},[user]);

  useEffect(()=>{
    if(!user)return;
    (async()=>{
      const wp=await getDoc(doc(db,"users",user.uid,"data","weekplan"));
      if(wp.exists())setWeekPlan(wp.data().plan||emptyWeekPlan());
      const wh=await getDoc(doc(db,"users",user.uid,"data","weekhistory"));
      if(wh.exists())setWeekHistory(wh.data().history||{});
    })();
  },[user]);

  useEffect(()=>{
    if(!user)return;
    const t=setTimeout(async()=>{
      await setDoc(doc(db,"users",user.uid,"data","weekplan"),{plan:weekPlan});
      const key=getWeekKey(0);
      const hasData=DAYS.some(d=>MEAL_TYPES.some(mt=>(weekPlan[d]?.[mt]||[]).length>0));
      if(hasData){const h={...weekHistory,[key]:weekPlan};setWeekHistory(h);await setDoc(doc(db,"users",user.uid,"data","weekhistory"),{history:h});}
    },1500);
    return()=>clearTimeout(t);
  },[weekPlan,user]);

  const saveRecipe=async(r)=>{
    const handle=profile?.username?`@${profile.username}`:(profile?.displayName||user.displayName||user.email||"");
    const data={...r,authorName:r.authorName||handle};
    if(editingRecipe) await updateDoc(doc(db,"users",user.uid,"recipes",r.id),data);
    else await addDoc(collection(db,"users",user.uid,"recipes"),data);
    setShowForm(false);setEditingRecipe(null);
  };

  const deleteRecipe=async(id)=>{
    if(window.confirm("Slett denne oppskriften?"))await deleteDoc(doc(db,"users",user.uid,"recipes",id));
  };

  const toggleFavRecipe=async(recipe)=>{
    const upd={...recipe,favorite:!recipe.favorite};
    await updateDoc(doc(db,"users",user.uid,"recipes",recipe.id),{favorite:upd.favorite});
  };

  // Filter + sort
  let filtered=recipes.filter(r=>{
    if(filterMeal!=="Alle"&&!(r.mealTypes||[r.mealType]).includes(filterMeal))return false;
    if(filterCat!=="Alle"&&r.category!==filterCat)return false;
    if(filterSort==="Varmmat"&&r.tempType!=="Varmmat")return false;
    if(filterSort==="Kaldmat"&&r.tempType!=="Kaldmat")return false;
    if(showFavOnly&&!r.favorite)return false;
    if(search&&!r.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  if(filterSort==="Høyest protein") filtered=[...filtered].sort((a,b)=>calcNutr(b.ingredients,b.servings).protein-calcNutr(a.ingredients,a.servings).protein);
  if(filterSort==="Lavest kalorier") filtered=[...filtered].sort((a,b)=>calcNutr(a.ingredients,a.servings).kcal-calcNutr(b.ingredients,b.servings).kcal);

  const TABS=[["recipes","📖 Oppskrifter"],["pantry","🫙 Spiskammer"],["plan","📅 Ukeplan"],["shopping","🛒 Handel"],["stats","📊 Statistikk"],["profile","👤 Profil"]];

  if(user===undefined)return <div style={{minHeight:"100vh",background:P.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:"Lato",color:P.muted,fontSize:16}}>Laster…</div></div>;
  if(user===null)return <AuthScreen/>;

  return <div style={{minHeight:"100vh",background:P.bg}}>
    <div style={{background:P.card,borderBottom:`1px solid ${P.border}`,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,gap:8}}>
      <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:22}}>🥘</span>
        <div>
          <div style={{fontFamily:"Playfair Display",fontSize:16,color:P.text,lineHeight:1}}>Måltidsplanlegger</div>
          <div style={{fontSize:9,color:P.muted}}>{profile?.displayName||user.displayName||user.email}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"flex-end"}}>
        {TABS.map(([key,label])=><button key={key} onClick={()=>setTab(key)} style={{background:tab===key?P.purpleDk:"transparent",border:`1.5px solid ${tab===key?P.purpleDk:P.border}`,borderRadius:10,padding:"5px 9px",cursor:"pointer",fontFamily:"Lato",fontSize:11,color:tab===key?"#fff":P.text,whiteSpace:"nowrap"}}>{label}</button>)}
      </div>
    </div>

    <div style={{maxWidth:1000,margin:"0 auto",padding:"16px 12px"}}>

      {tab==="recipes"&&<>
        {showForm||editingRecipe
          ?<RecipeForm initial={editingRecipe} pantry={pantry} onSave={saveRecipe} onCancel={()=>{setShowForm(false);setEditingRecipe(null);}}/>
          :<>
            <div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <input style={{...iSt,flex:1,minWidth:110}} placeholder="🔍 Søk…" value={search} onChange={e=>setSearch(e.target.value)}/>
              <select style={iSt} value={filterMeal} onChange={e=>setFilterMeal(e.target.value)}><option value="Alle">Alle måltider</option>{MEAL_TYPES.map(m=><option key={m}>{m}</option>)}</select>
              <select style={iSt} value={filterCat} onChange={e=>setFilterCat(e.target.value)}><option value="Alle">Alle kategorier</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
              <select style={iSt} value={filterSort} onChange={e=>setFilterSort(e.target.value)}>{SORT_OPTIONS.map(s=><option key={s}>{s}</option>)}</select>
              <button onClick={()=>setShowFavOnly(x=>!x)} style={{background:showFavOnly?"#FFF9C4":P.card,border:`1.5px solid ${showFavOnly?"#F9A825":P.border}`,borderRadius:10,padding:"6px 10px",cursor:"pointer",fontFamily:"Lato",fontSize:12,color:P.text}}>⭐</button>
              <button onClick={()=>{setShowForm(true);setEditingRecipe(null);}} style={{background:P.greenDk,border:"none",borderRadius:10,padding:"7px 12px",cursor:"pointer",fontFamily:"Lato",color:"#fff",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>+ Ny</button>
            </div>
            {filtered.length===0&&<div style={{textAlign:"center",padding:"55px 0",color:P.muted}}><div style={{fontSize:42,marginBottom:10}}>🍳</div><div style={{fontFamily:"Playfair Display",fontSize:16}}>Ingen oppskrifter</div></div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}}>
              {filtered.map(r=><RecipeCard key={r.id} recipe={r} pantry={pantry} visibleNutr={visibleNutr}
                onEdit={r=>{setEditingRecipe(r);setShowForm(true);}}
                onDelete={deleteRecipe}
                onAddToPlan={r=>{setAddToPlanTarget(r);setTab("plan");}}
                onToggleFav={toggleFavRecipe}/>)}
            </div>
          </>}
      </>}

      {tab==="pantry"&&<PantryTab uid={user.uid} pantry={pantry} setPantry={setPantry} visibleNutr={visibleNutr}/>}
      {tab==="plan"&&<WeekPlan recipes={recipes} weekPlan={weekPlan} setWeekPlan={setWeekPlan} addToPlanTarget={addToPlanTarget} setAddToPlanTarget={setAddToPlanTarget} visibleNutr={visibleNutr}/>}
      {tab==="shopping"&&<ShoppingList recipes={recipes} weekPlan={weekPlan} pantry={pantry}/>}
      {tab==="stats"&&<StatsTab recipes={recipes} weekPlan={weekPlan} weekHistory={weekHistory} visibleNutr={visibleNutr}/>}
      {tab==="profile"&&<ProfileTab user={user} profile={profile} setProfile={setProfile} recipes={recipes} visibleNutr={visibleNutr} setVisibleNutr={setVisibleNutr}/>}
    </div>
  </div>;
}

const appRoot = ReactDOM.createRoot(document.getElementById("root"));
appRoot.render(<><App/><DropdownPortal/></>);
</script>

</body>
</html>
