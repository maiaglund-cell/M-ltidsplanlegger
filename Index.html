<!DOCTYPE html>

<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Måltidsplanlegger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#F5F0E8;font-family:'Lato',sans-serif;}
    #root{min-height:100vh;}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Make Firebase available globally for React code
    window.__firebase = {
      initializeApp, getAuth, onAuthStateChanged, signOut,
      createUserWithEmailAndPassword, signInWithEmailAndPassword,
      signInWithPopup, GoogleAuthProvider,
      getFirestore, doc, setDoc, getDoc, collection,
      addDoc, updateDoc, deleteDoc, onSnapshot, query
    };
    window.__firebaseReady = true;
    document.dispatchEvent(new Event('firebaseReady'));
  </script>

  <!-- React + Babel -->

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // Wait for Firebase then boot app
    function waitForFirebase() {
      return new Promise(resolve => {
        if (window.__firebaseReady) { resolve(); return; }
        document.addEventListener('firebaseReady', resolve, { once: true });
      });
    }

    await waitForFirebase();

    const {
      initializeApp, getAuth, onAuthStateChanged, signOut,
      createUserWithEmailAndPassword, signInWithEmailAndPassword,
      signInWithPopup, GoogleAuthProvider,
      getFirestore, doc, setDoc, getDoc, collection,
      addDoc, updateDoc, deleteDoc, onSnapshot, query
    } = window.__firebase;

    const firebaseConfig = {
      apiKey: "AIzaSyChy4t6NZPuKzNXhxssmoAUhXVwCVKXJWM",
      authDomain: "maaltidsplanlegger-aa9a6.firebaseapp.com",
      projectId: "maaltidsplanlegger-aa9a6",
      storageBucket: "maaltidsplanlegger-aa9a6.firebasestorage.app",
      messagingSenderId: "48888722293",
      appId: "1:48888722293:web:5bc47fa4058d265a1d993c",
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);
    const googleProvider = new GoogleAuthProvider();

    // ─── CONSTANTS ────────────────────────────────────────────────────────────
    const MEAL_TYPES = ["Frokost","Lunsj","Middag","Mellommåltid","Snacks","Dessert"];
    const DAYS = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
    const CATEGORIES = ["Kaloriunderskudd","Ikke bry deg om kalorier"];
    const ALLERGEN_LIST = ["Gluten","Melk","Egg","Nøtter","Peanøtter","Soya","Fisk","Skalldyr","Selleri","Sennep","Sesam","Sulfitter","Lupin","Bløtdyr"];
    const GENDER_OPTIONS = ["Mann","Kvinne","Annet","Ønsker ikke å oppgi"];

    const MC = {
      Frokost:      {bg:"#FFF9C4",border:"#F9A825",icon:"🌅"},
      Lunsj:        {bg:"#C8E6C9",border:"#388E3C",icon:"🥗"},
      Middag:       {bg:"#BBDEFB",border:"#1565C0",icon:"🍽️"},
      Mellommåltid: {bg:"#F8BBD0",border:"#C2185B",icon:"🍎"},
      Snacks:       {bg:"#FFCCBC",border:"#E64A19",icon:"🍿"},
      Dessert:      {bg:"#E1BEE7",border:"#6A1B9A",icon:"🍰"},
    };

    const P = {
      bg:"#F5F0E8",card:"#FFFDF8",green:"#C8E6C9",greenDk:"#81C784",
      pink:"#F8BBD0",blue:"#BBDEFB",yellow:"#FFF9C4",purple:"#E1BEE7",
      purpleDk:"#CE93D8",peach:"#FFCCBC",teal:"#B2DFDB",tealDk:"#4DB6AC",
      border:"#E8E0D0",text:"#4A4035",muted:"#9E8E78",
    };

    const NUTR_FIELDS = [
      {key:"kcal",      label:"Kcal",         unit:"",  color:"#FFF9C4", always:true},
      {key:"protein",   label:"Protein",      unit:"g", color:"#C8E6C9", always:true},
      {key:"fat",       label:"Fett",         unit:"g", color:"#FFCCBC", always:true},
      {key:"saturated", label:"Mettet fett",  unit:"g", color:"#FFCCBC", always:false},
      {key:"carbs",     label:"Karbohydrater",unit:"g", color:"#BBDEFB", always:true},
      {key:"sugar",     label:"Sukkerarter",  unit:"g", color:"#F8BBD0", always:false},
      {key:"fiber",     label:"Fiber",        unit:"g", color:"#DCEDC8", always:true},
      {key:"salt",      label:"Salt",         unit:"g", color:"#E0E0E0", always:false},
    ];

    const iSt = {
      border:"1.5px solid #E8E0D0",borderRadius:8,padding:"6px 10px",
      background:"#FFFDF8",color:"#4A4035",fontFamily:"Lato, sans-serif",
      fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",
    };
    const lSt = {fontSize:11,color:"#9E8E78",fontFamily:"Lato, sans-serif",marginBottom:3,display:"block"};

    const emptyWeekPlan = () => Object.fromEntries(DAYS.map(d=>[d,Object.fromEntries(MEAL_TYPES.map(m=>[m,[]]))]));
    const emptyIng = () => ({name:"",amount:"",unit:"",kcal:"",protein:"",fat:"",saturated:"",carbs:"",sugar:"",fiber:"",salt:"",pantryId:null});
    const emptyRecipe = () => ({name:"",category:"Kaloriunderskudd",mealType:"Middag",servings:1,ingredients:[emptyIng()],steps:[""],image:null});
    const emptyPantry = () => ({brandName:"",genericTag:"",unit:"g",kcalPer100:"",proteinPer100:"",fatPer100:"",saturatedPer100:"",carbsPer100:"",sugarPer100:"",fiberPer100:"",saltPer100:"",allergens:[],notes:""});

    function calcNutr(ings,srv=1){
      const t={};NUTR_FIELDS.forEach(f=>{t[f.key]=0;});
      ings.forEach(i=>{NUTR_FIELDS.forEach(f=>{t[f.key]+=parseFloat(i[f.key])||0;});});
      const o={};NUTR_FIELDS.forEach(f=>{o[f.key]=Math.round(t[f.key]/(srv||1)*10)/10;});
      o.kcal=Math.round(t.kcal/(srv||1));return o;
    }
    function autoNutr(amount,p){
      const a=parseFloat(amount)||0;if(!p||a===0)return null;
      const o={};
      NUTR_FIELDS.forEach(f=>{const k=f.key==="kcal"?"kcalPer100":`${f.key}Per100`;const v=parseFloat(p[k])||0;o[f.key]=f.key==="kcal"?Math.round(v*a/100):Math.round(v*a/100*10)/10;});
      return o;
    }
    function getEntries(wp,d,mt){return(wp[d]?.[mt]||[]).map(e=>typeof e==="object"?e:{rid:e,portions:1});}
    function getWeekKey(offset=0){const now=new Date();now.setDate(now.getDate()+offset*7);const jan1=new Date(now.getFullYear(),0,1);const week=Math.ceil(((now-jan1)/86400000+jan1.getDay()+1)/7);return `${now.getFullYear()}-W${String(week).padStart(2,"0")}`;}
    function weekLabel(key){const[yr,wk]=key.split("-W");return `Uke ${parseInt(wk)}, ${yr}`;}

    function Badge({label,value,unit,color}){
      return <div style={{background:color,borderRadius:10,padding:"4px 9px",textAlign:"center",minWidth:54}}>
        <div style={{fontSize:10,color:P.muted,fontFamily:"Lato, sans-serif"}}>{label}</div>
        <div style={{fontSize:13,fontWeight:700,color:P.text}}>{value}<span style={{fontSize:9,fontWeight:400}}>{unit}</span></div>
      </div>;
    }
    function NutrBadges({nutr,compact=false}){
      return <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {NUTR_FIELDS.map(f=>{
          const v=nutr[f.key];
          if(!f.always&&(v===undefined||v===0||v===""))return null;
          if(compact&&!f.always)return null;
          return <Badge key={f.key} label={f.label} value={v??0} unit={f.unit} color={f.color}/>;
        })}
      </div>;
    }

    function IngInput({value,pantry,onChange,onSelect}){
      const [open,setOpen]=useState(false);
      const ref=useRef();
      const matches=value.trim()?pantry.filter(p=>p.brandName.toLowerCase().includes(value.toLowerCase())||p.genericTag.toLowerCase().includes(value.toLowerCase())):[];
      useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
      return <div ref={ref} style={{position:"relative"}}>
        <input style={iSt} placeholder="Ingrediens…" value={value} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}/>
        {open&&matches.length>0&&<div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,background:P.card,border:`1px solid ${P.border}`,borderRadius:10,zIndex:300,boxShadow:"0 4px 18px rgba(0,0,0,0.1)",maxHeight:210,overflowY:"auto"}}>
          {matches.map(p=><div key={p.id} onMouseDown={()=>{onSelect(p);setOpen(false);}} style={{padding:"7px 12px",cursor:"pointer",borderBottom:`1px solid ${P.border}`}} onMouseEnter={e=>e.currentTarget.style.background=P.bg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{fontFamily:"Lato, sans-serif",fontSize:13,fontWeight:700,color:P.text}}>{p.brandName}</div>
            {p.genericTag&&<div style={{fontSize:10,color:P.tealDk}}>#{p.genericTag}</div>}
            <div style={{fontSize:10,color:P.muted}}>{p.kcalPer100} kcal · {p.proteinPer100}g P · {p.fatPer100}g F · {p.carbsPer100}g K per 100{p.unit}</div>
            {p.allergens?.length>0&&<div style={{fontSize:10,color:"#c62828"}}>⚠ {p.allergens.join(", ")}</div>}
          </div>)}
        </div>}
      </div>;
    }

    function AuthScreen(){
      const [mode,setMode]=useState("login");
      const [email,setEmail]=useState("");
      const [password,setPassword]=useState("");
      const [password2,setPassword2]=useState("");
      const [error,setError]=useState("");
      const [loading,setLoading]=useState(false);

      const handleSubmit=async()=>{
        setError("");
        if(!email||!password){setError("Fyll inn e-post og passord.");return;}
        if(mode==="register"&&password!==password2){setError("Passordene er ikke like.");return;}
        if(mode==="register"&&password.length<6){setError("Passordet må være minst 6 tegn.");return;}
        setLoading(true);
        try{
          if(mode==="register") await createUserWithEmailAndPassword(auth,email,password);
          else await signInWithEmailAndPassword(auth,email,password);
        }catch(e){
          const msgs={"auth/email-already-in-use":"E-postadressen er allerede i bruk.","auth/invalid-email":"Ugyldig e-postadresse.","auth/wrong-password":"Feil passord.","auth/user-not-found":"Ingen bruker med denne e-posten.","auth/invalid-credential":"Feil e-post eller passord."};
          setError(msgs[e.code]||e.message);
        }
        setLoading(false);
      };

      const handleGoogle=async()=>{
        setError("");setLoading(true);
        try{await signInWithPopup(auth,googleProvider);}
        catch(e){setError("Google-innlogging feilet. Prøv igjen.");}
        setLoading(false);
      };

      return <div style={{minHeight:"100vh",background:P.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:P.card,borderRadius:20,padding:32,width:"100%",maxWidth:400,boxShadow:"0 8px 40px rgba(0,0,0,0.1)"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:44,marginBottom:8}}>🥘</div>
            <div style={{fontFamily:"'Playfair Display', serif",fontSize:24,color:P.text}}>Måltidsplanlegger</div>
            <div style={{fontSize:12,color:P.muted,marginTop:4}}>{mode==="login"?"Logg inn på din konto":"Opprett ny konto"}</div>
          </div>
          <div style={{marginBottom:14}}><label style={lSt}>E-postadresse</label><input style={iSt} type="email" placeholder="din@epost.no" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/></div>
          <div style={{marginBottom:14}}><label style={lSt}>Passord</label><input style={iSt} type="password" placeholder="Minst 6 tegn" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/></div>
          {mode==="register"&&<div style={{marginBottom:14}}><label style={lSt}>Gjenta passord</label><input style={iSt} type="password" placeholder="Skriv passordet én gang til" value={password2} onChange={e=>setPassword2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/></div>}
          {error&&<div style={{background:"#FFCDD2",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#b71c1c",fontFamily:"Lato, sans-serif",marginBottom:12}}>{error}</div>}
          <button onClick={handleSubmit} disabled={loading} style={{width:"100%",background:P.greenDk,border:"none",borderRadius:12,padding:"11px 0",cursor:"pointer",fontFamily:"Lato, sans-serif",color:"#fff",fontWeight:700,fontSize:14,marginBottom:10,opacity:loading?0.7:1}}>
            {loading?"Laster…":mode==="login"?"Logg inn":"Opprett konto"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{flex:1,height:1,background:P.border}}/><span style={{fontSize:11,color:P.muted}}>eller</span><div style={{flex:1,height:1,background:P.border}}/>
          </div>
          <button onClick={handleGoogle} disabled={loading} style={{width:"100%",background:P.card,border:`1.5px solid ${P.border}`,borderRadius:12,padding:"10px 0",cursor:"pointer",fontFamily:"Lato, sans-serif",color:P.text,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:18}}>
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.4-7.9 19.9-18H43.6v-6z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36 24 36c-5.2 0-9.6-3-11.4-7.3l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.7-4.8 6.2l6.2 5.2C40.9 36.1 44 30.5 44 24c0-1.4-.1-2.7-.4-4z"/></svg>
            Fortsett med Google
          </button>
          <div style={{textAlign:"center",fontSize:12,color:P.muted,fontFamily:"Lato, sans-serif"}}>
            {mode==="login"?<>Ingen konto? <span onClick={()=>{setMode("register");setError("");}} style={{color:P.tealDk,cursor:"pointer",fontWeight:700}}>Opprett konto</span></>:<>Har du konto? <span onClick={()=>{setMode("login");setError("");}} style={{color:P.tealDk,cursor:"pointer",fontWeight:700}}>Logg inn</span></>}
          </div>
        </div>
      </div>;
    }

    function ProfileTab({user,profile,setProfile,recipes}){
      const [editing,setEditing]=useState(false);
      const [gender,setGender]=useState(profile?.gender||"");
      const memberDate=profile?.createdAt?new Date(profile.createdAt).toLocaleDateString("nb-NO",{year:"numeric",month:"long",day:"numeric"}):"—";
      const save=async()=>{const updated={...profile,gender};await setDoc(doc(db,"users",user.uid),updated,{merge:true});setProfile(updated);setEditing(false);};
      return <div style={{maxWidth:500}}>
        <div style={{background:P.card,borderRadius:16,border:`1px solid ${P.border}`,padding:24,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
            <div style={{width:56,height:56,borderRadius:"50%",background:P.purple,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>
              {user.photoURL?<img src={user.photoURL} style={{width:"100%",height:"100%",borderRadius:"50%",objectFit:"cover"}} alt=""/>:"👤"}
            </div>
            <div><div style={{fontFamily:"'Playfair Display', serif",fontSize:17,color:P.text}}>{user.displayName||user.email}</div><div style={{fontSize:12,color:P.muted,fontFamily:"Lato, sans-serif"}}>{user.email}</div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            <div style={{background:P.bg,borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,color:P.muted,fontFamily:"Lato, sans-serif"}}>Medlem siden</div><div style={{fontFamily:"Lato, sans-serif",fontSize:13,fontWeight:700,color:P.text,marginTop:3}}>{memberDate}</div></div>
            <div style={{background:P.bg,borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,color:P.muted,fontFamily:"Lato, sans-serif"}}>Antall oppskrifter</div><div style={{fontFamily:"Lato, sans-serif",fontSize:22,fontWeight:700,color:P.tealDk,marginTop:3}}>{recipes.length}</div></div>
          </div>
          {editing?<div>
            <label style={lSt}>Kjønn</label>
            <select style={iSt} value={gender} onChange={e=>setGender(e.target.value)}><option value="">— Velg —</option>{GENDER_OPTIONS.map(g=><option key={g}>{g}</option>)}</select>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>setEditing(false)} style={{flex:1,background:P.border,border:"none",borderRadius:10,padding:"8px 0",cursor:"pointer",fontFamily:"Lato, sans-serif",color:P.text}}>Avbryt</button>
              <button onClick={save} style={{flex:1,background:P.tealDk,border:"none",borderRadius:10,padding:"8px 0",cursor:"pointer",fontFamily:"Lato, sans-serif",color:"#fff",fontWeight:700}}>Lagre</button>
            </div>
          </div>:<div>
            <div style={{fontSize:12,color:P.muted,fontFamily:"Lato, sans-serif",marginBottom:4}}>Kjønn</div>
            <div style={{fontFamily:"Lato, sans-serif",fontSize:14,color:P.text,marginBottom:14}}>{profile?.gender||"Ikke oppgitt"}</div>
            <button onClick={()=>setEditing(true)} style={{background:P.yellow,border:"none",borderRadius:10,padding:"7px 18px",cursor:"pointer",fontFamily:"Lato, sans-serif",color:P.text}}>Rediger profil</button>
          </div>}
        </div>
        <button onClick={()=>signOut(auth)} style={{width:"100%",background:P.pink,border:"none",borderRadius:12,padding:"11px 0",cursor:"pointer",fontFamily:"Lato, sans-serif",color:P.text,fontWeight:700,fontSize:14}}>Logg ut</button>
      </div>;
    }

    function BarcodeScanner({onResult,onClose}){
      const videoRef=useRef();const streamRef=useRef();const intervalRef=useRef();
      const [status,setStatus]=useState("Starter kamera…");const [scanning,setScanning]=useState(false);
      useEffect(()=>{
        let active=true;
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{if(!active){stream.getTracks().forEach(t=>t.stop());return;}streamRef.current=stream;if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}setStatus("Hold strekkoden foran kameraet");setScanning(true);}).catch(()=>setStatus("Kameratilgang nektet."));
        return()=>{active=false;if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());clearInterval(intervalRef.current);};
      },[]);
      useEffect(()=>{
        if(!scanning)return;
        if(!("BarcodeDetector" in window)){setStatus("Strekkodeskanning støttes ikke. Skriv inn manuelt.");return;}
        const detector=new window.BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
        intervalRef.current=setInterval(async()=>{if(!videoRef.current||videoRef.current.readyState<2)return;try{const codes=await detector.detect(videoRef.current);if(codes.length>0){clearInterval(intervalRef.current);setStatus("Strekkode funnet! Henter info…");await lookup(codes[0].rawValue);}}catch{}},400);
        return()=>clearInterval(intervalRef.current);
      },[scanning]);
      const lookup=async(barcode)=>{
        try{const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);const data=await res.json();if(data.status===1&&data.product){const pr=data.product;const n=pr.nutriments||{};onResult({brandName:pr.product_name||"",genericTag:(pr.categories_tags||[])[0]?.replace("en:","").replace("no:","")||"",unit:"g",kcalPer100:String(Math.round(n["energy-kcal_100g"]||0)),proteinPer100:String(Math.round((n.proteins_100g||0)*10)/10),fatPer100:String(Math.round((n.fat_100g||0)*10)/10),saturatedPer100:String(Math.round((n["saturated-fat_100g"]||0)*10)/10),carbsPer100:String(Math.round((n.carbohydrates_100g||0)*10)/10),sugarPer100:String(Math.round((n.sugars_100g||0)*10)/10),fiberPer100:String(Math.round((n.fiber_100g||0)*10)/10),saltPer100:String(Math.round((n.salt_100g||0)*10)/10),allergens:(pr.allergens_tags||[]).map(a=>a.replace("en:","").replace("no:","")),notes:pr.brands||""});}else{setStatus("Fant ikke produkt. Prøv manuelt.");setScanning(true);}}catch{setStatus("Nettverksfeil.");}
      };
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:P.card,borderRadius:20,padding:20,maxWidth:420,width:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h3 style={{margin:0,fontFamily:"'Playfair Display', serif",color:P.text,fontSize:18}}>📷 Skann strekkode</h3>
            <button onClick={onClose} style={{background:P.pink,border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:14}}>✕</button>
          </div>
          <div style={{position:"relative",borderRadius:12,overflow:"hidden",background:"#000",marginBottom:12}}>
            <video ref={videoRef} style={{width:"100%",display:"block",maxHeight:280,objectFit:"cover"}} muted playsInline/>

    function PantryTab({uid,pantry,setPantry}){
      const [form,setForm]=useState(false);const [editing,setEditing]=useState(null);const [search,setSearch]=useState("");
      const save=async(it)=>{
        if(editing){await updateDoc(doc(db,"users",uid,"pantry",editing.id),it);setPantry(p=>p.map(x=>x.id===editing.id?{...it,id:editing.id}:x));}
        else{const ref=await addDoc(collection(db,"users",uid,"pantry"),it);setPantry(p=>[...p,{...it,id:ref.id}]);}
        setForm(false);setEditing(null);
      };
      const del=async(id)=>{if(window.confirm("Slett?")){{await deleteDoc(doc(db,"users",uid,"pantry",id));setPantry(p=>p.filter(x=>x.id!==id));}}};
      if(form||editing)return <PantryForm initial={editing} onSave={save} onCancel={()=>{setForm(false);setEditing(null);}}/>;
      const filtered=pantry.filter(p=>!search||p.brandName.toLowerCase().includes(search.toLowerCase())||p.genericTag.toLowerCase().includes(search.toLowerCase()));
      const groups={};filtered.forEach(p=>{const t=p.genericTag||"Ukategorisert";if(!groups[t])groups[t]=[];groups[t].push(p);});
      return <div>
        <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
          <input style={{...iSt,flex:1}} placeholder="🔍 Søk i spiskammer…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <button onClick={()=>setForm(true)} style={{background:P.tealDk,border:"none",borderRadius:10,padding:"7px 16px",cursor:"pointer",fontFamily:"Lato, sans-serif",color:"#fff",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>+ Ny vare</button>
        </div>
        {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:P.muted}}><div style={{fontSize:44,marginBottom:10}}>🫙</div><div style={{fontFamily:"'Playfair Display', serif",fontSize:17}}>Spiskammeret er tomt</div></div>}
        {Object.entries(groups).sort(([a],[b])=>a.localeCompare(b,"no")).map(([tag,items])=><div key={tag} style={{marginBottom:20}}>
          <div style={{marginBottom:7}}><span style={{background:P.teal,borderRadius:20,padding:"2px 12px",fontSize:12,fontWeight:700,color:P.tealDk,fontFamily:"Lato, sans-serif"}}>#{tag}</span></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8}}>
            {items.map(it=><div key={it.id} style={{background:P.card,border:`1.5px solid ${P.teal}`,borderRadius:12,padding:"11px 13px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <div><div style={{fontFamily:"Lato, sans-serif",fontSize:13,fontWeight:700,color:P.text}}>{it.brandName}</div>{it.genericTag&&<div style={{fontSize:10,color:P.tealDk}}>#{it.genericTag}</div>}{it.notes&&<div style={{fontSize:10,color:P.muted}}>{it.notes}</div>}</div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>setEditing(it)} style={{background:P.yellow,border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✎</button>
                  <button onClick={()=>del(it.id)} style={{background:P.pink,border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✕</button>
                </div>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:it.allergens?.length>0?7:0}}>
                {NUTR_FIELDS.map(f=>{const pk=f.key==="kcal"?"kcalPer100":`${f.key}Per100`;const v=it[pk];if(!f.always&&(!v||v==="0"||v===""))return null;return <Badge key={f.key} label={f.label} value={v||0} unit={`${f.unit}/100${it.unit}`} color={f.color}/>;})}</div>
              {it.allergens?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{it.allergens.map(a=><span key={a} style={{background:"#FFCDD2",border:"1px solid #EF9A9A",borderRadius:20,padding:"1px 8px",fontSize:10,color:"#b71c1c",fontFamily:"Lato, sans-serif"}}>⚠ {a}</span>)}</div>}
            </div>)}
          </div>
        </div>)}
      </div>;
    }

            <button onClick={()=>{imgRef.current.setAttribute("capture","environment");imgRef.current.click();}} style={{background:P.teal,border:`1.5px dashed ${P.tealDk}`,borderRadius:10,padding:"9px 16px",cursor:"pointer",fontFamily:"Lato, sans-serif",fontSize:12,color:P.text}}>📷 Ta bilde</button>

        <div style={{marginBottom:20}}>

          <div style={{overflowX:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:cols,gap:4,marginBottom:4,minWidth:900}}>{["Ingrediens","Mengde","Enhet","Kcal","Prot","Fett","M.fett","Karbo","Sukker","Fiber","Salt",""].map((h,i)=><div key={i} style={{fontSize:10,color:P.muted,fontFamily:"Lato, sans-serif"}}>{h}</div>)}</div>
            {r.ingredients.map((ing,i)=>{const linked=ing.pantryId?pantry.find(p=>p.id===ing.pantryId):null;return <div key={i} style={{marginBottom:5}}>

    function RecipeDetail({recipe,pantry,onClose,onEdit,onDelete,onAddToPlan}){

          <div style={{flex:1,display:"flex",flexDirection:"column",padding:"11px 13px",minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{fontSize:15}}>{mc.icon}</span><div style={{fontFamily:"'Playfair Display', serif",fontSize:14,fontWeight:600,color:P.text,lineHeight:1.2}}>{recipe.name}</div></div>
            <div style={{fontSize:10,color:P.muted,fontFamily:"Lato, sans-serif",marginBottom:7}}>{recipe.mealType} · {recipe.servings} porsjon{recipe.servings>1?"er":""}</div>
            <NutrBadges nutr={nutr} compact={true}/>
            {allergens.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:6}}>{allergens.map(a=><span key={a} style={{background:"#FFCDD2",border:"1px solid #EF9A9A",borderRadius:20,padding:"1px 6px",fontSize:9,color:"#b71c1c",fontFamily:"Lato, sans-serif"}}>⚠ {a}</span>)}</div>}
            <div style={{marginTop:"auto",paddingTop:8,display:"flex",gap:5}} onClick={e=>e.stopPropagation()}>
              <span style={{fontSize:10,background:recipe.category==="Kaloriunderskudd"?P.green:P.pink,borderRadius:20,padding:"2px 8px",color:P.text,fontFamily:"Lato, sans-serif"}}>{recipe.category==="Kaloriunderskudd"?"🥦 Underskudd":"🎂 Fri"}</span>
              <button onClick={()=>onAddToPlan(recipe)} style={{marginLeft:"auto",background:P.blue,border:"none",borderRadius:8,padding:"3px 9px",cursor:"pointer",fontSize:10,fontFamily:"Lato, sans-serif",color:P.text}}>+ Plan</button>
              <button onClick={()=>onEdit(recipe)} style={{background:P.yellow,border:"none",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:11}}>✎</button>
              <button onClick={()=>onDelete(recipe.id)} style={{background:P.pink,border:"none",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:11}}>✕</button>
            </div>
          </div>
          {recipe.image&&<div style={{width:110,flexShrink:0,overflow:"hidden"}}><img src={recipe.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>}
        </div>
      </>;
    }

    function AddMealBtn({recipes,onAdd}){
      const [open,setOpen]=useState(false);const ref=useRef();
      useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
      return <div ref={ref} style={{position:"relative"}}>
        <button onClick={()=>setOpen(x=>!x)} style={{background:P.border,border:"none",borderRadius:8,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:"Lato, sans-serif",color:P.text}}>+ Legg til</button>
        {open&&<div style={{position:"absolute",top:28,left:0,background:P.card,border:`1px solid ${P.border}`,borderRadius:10,padding:5,zIndex:100,minWidth:170,boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}>
          {recipes.length===0&&<div style={{fontSize:11,color:P.muted,fontFamily:"Lato, sans-serif",padding:"4px 6px"}}>Ingen oppskrifter</div>}
          {recipes.map(r=><div key={r.id} onClick={()=>{onAdd(r.id);setOpen(false);}} style={{padding:"5px 8px",cursor:"pointer",borderRadius:6,fontFamily:"Lato, sans-serif",fontSize:12,color:P.text}} onMouseEnter={e=>e.currentTarget.style.background=P.bg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{r.name}</div>)}
        </div>}
      </div>;
    }

    function WeekPlan({recipes,weekPlan,setWeekPlan,addToPlanTarget,setAddToPlanTarget}){
      const [day,setDay]=useState("Mandag");
      const addToDay=(d,mt,id)=>setWeekPlan(wp=>{const u={...wp};u[d]={...u[d]};u[d][mt]=[...(u[d][mt]||[]),{rid:id,portions:1}];return u;});
      const removeFromDay=(d,mt,i)=>setWeekPlan(wp=>{const u={...wp};u[d]={...u[d]};u[d][mt]=u[d][mt].filter((_,j)=>j!==i);return u;});
      const setPortions=(d,mt,i,val)=>setWeekPlan(wp=>{const u={...wp};u[d]={...u[d]};const e=[...u[d][mt]];const en=typeof e[i]==="object"?{...e[i]}:{rid:e[i],portions:1};en.portions=Math.max(1,parseInt(val)||1);e[i]=en;u[d][mt]=e;return u;});
      const dayNutr=d=>{const t={};NUTR_FIELDS.forEach(f=>{t[f.key]=0;});MEAL_TYPES.forEach(mt=>getEntries(weekPlan,d,mt).forEach(({rid})=>{const r=recipes.find(x=>x.id===rid);if(r){const n=calcNutr(r.ingredients,r.servings);NUTR_FIELDS.forEach(f=>{t[f.key]+=n[f.key]||0;});}}));const o={};NUTR_FIELDS.forEach(f=>{o[f.key]=Math.round(t[f.key]*10)/10;});o.kcal=Math.round(t.kcal);return o;};
      useEffect(()=>{if(addToPlanTarget){addToDay(day,addToPlanTarget.mealType,addToPlanTarget.id);setAddToPlanTarget(null);}},[addToPlanTarget]);
      return <div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
          {DAYS.map(d=>{const dn=dayNutr(d);return <button key={d} onClick={()=>setDay(d)} style={{background:day===d?P.purpleDk:P.card,border:`1.5px solid ${day===d?P.purpleDk:P.border}`,borderRadius:10,padding:"5px 10px",cursor:"pointer",fontFamily:"Lato, sans-serif",fontSize:12,color:day===d?"#fff":P.text}}><div>{d.slice(0,3)}</div><div style={{fontSize:9,opacity:0.8}}>{dn.kcal} kcal</div></button>;})}
        </div>
        <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <h3 style={{margin:0,fontFamily:"'Playfair Display', serif",color:P.text}}>{day}</h3>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}><NutrBadges nutr={dayNutr(day)} compact={true}/><div style={{fontSize:10,color:P.muted,fontFamily:"Lato, sans-serif"}}>Næring per porsjon for deg</div></div>
          </div>
          {MEAL_TYPES.map(mt=>{const mc=MC[mt];const entries=getEntries(weekPlan,day,mt);return <div key={mt} style={{marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:P.text,fontFamily:"Lato, sans-serif",marginBottom:5}}>{mc.icon} {mt}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {entries.map(({rid,portions},i)=>{const r=recipes.find(x=>x.id===rid);if(!r)return null;const n=calcNutr(r.ingredients,r.servings);return <div key={i} style={{background:mc.bg,border:`1px solid ${mc.border}30`,borderRadius:10,padding:"5px 10px",display:"flex",gap:6,alignItems:"center",fontSize:11,fontFamily:"Lato, sans-serif",color:P.text}}>
                <span style={{fontWeight:600}}>{r.name}</span><span style={{color:P.muted,fontSize:10}}>{n.kcal} kcal</span>
                <div style={{display:"flex",alignItems:"center",gap:3,background:"rgba(0,0,0,0.06)",borderRadius:7,padding:"1px 4px"}}>
                  <button onClick={()=>setPortions(day,mt,i,portions-1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:P.text,padding:"0 2px"}}>−</button>
                  <span style={{fontSize:11,minWidth:14,textAlign:"center"}}>{portions}</span>
                  <button onClick={()=>setPortions(day,mt,i,portions+1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:P.text,padding:"0 2px"}}>+</button>
                  <span style={{fontSize:9,color:P.muted}}>porsj.</span>
                </div>
                <button onClick={()=>removeFromDay(day,mt,i)} style={{background:"none",border:"none",cursor:"pointer",color:P.muted,fontSize:13,padding:0}}>×</button>
              </div>;})}
              <AddMealBtn recipes={recipes.filter(r=>r.mealType===mt)} onAdd={id=>addToDay(day,mt,id)}/>
            </div>
          </div>;})}
        </div>
      </div>;
    }

    function ShoppingList({recipes,weekPlan,pantry}){
      const buildList=()=>{const items={};DAYS.forEach(d=>MEAL_TYPES.forEach(mt=>getEntries(weekPlan,d,mt).forEach(({rid,portions})=>{const r=recipes.find(x=>x.id===rid);if(!r)return;const mult=(portions||1)/(r.servings||1);r.ingredients.forEach(ing=>{if(!ing.name.trim())return;const key=`${ing.name.toLowerCase().trim()}__${ing.unit.toLowerCase().trim()}`;if(!items[key]){const pi=ing.pantryId?pantry.find(p=>p.id===ing.pantryId):null;items[key]={name:ing.name,unit:ing.unit,amount:0,pantryItem:pi};}items[key].amount+=(parseFloat(ing.amount)||0)*mult;});}))); return Object.values(items).sort((a,b)=>a.name.localeCompare(b.name,"no"));};
      const list=buildList();const [checked,setChecked]=useState({});
      return <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><h3 style={{margin:0,fontFamily:"'Playfair Display', serif",color:P.text}}>🛒 Handleliste for uka</h3><span style={{fontSize:11,color:P.muted,fontFamily:"Lato, sans-serif"}}>{list.length} varer</span></div>
        {list.length===0&&<div style={{color:P.muted,fontFamily:"Lato, sans-serif",fontSize:13}}>Ingen måltider i ukeplanen ennå.</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {list.map(it=>{const k=it.name+it.unit;return <div key={k} onClick={()=>setChecked(c=>({...c,[k]:!c[k]}))} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",background:checked[k]?"#F0F0F0":P.bg,borderRadius:10,cursor:"pointer",opacity:checked[k]?0.5:1,border:`1px solid ${P.border}`}}>
            <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${P.greenDk}`,background:checked[k]?P.greenDk:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{checked[k]&&<span style={{color:"#fff",fontSize:9}}>✓</span>}</div>
            <div style={{flex:1}}><div style={{fontFamily:"Lato, sans-serif",fontSize:13,color:P.text,textDecoration:checked[k]?"line-through":"none",fontWeight:600}}>{it.name}</div>{it.pantryItem?.genericTag&&<div style={{fontSize:9,color:P.tealDk}}>#{it.pantryItem.genericTag}</div>}</div>
            <span style={{fontFamily:"Lato, sans-serif",fontSize:12,color:P.muted,fontWeight:700,whiteSpace:"nowrap"}}>{it.amount%1===0?it.amount:Math.round(it.amount*10)/10} {it.unit}</span>
          </div>;})}
        </div>
      </div>;
    }

    function StatsTab({recipes,weekPlan,weekHistory}){
      const [offset,setOffset]=useState(0);
      const allKeys=[getWeekKey(0),...Object.keys(weekHistory)].filter((v,i,a)=>a.indexOf(v)===i).sort().reverse();
      const key=allKeys[offset]||getWeekKey(0);
      const plan=key===getWeekKey(0)?weekPlan:(weekHistory[key]||emptyWeekPlan());
      const dayNutr=d=>{const t={};NUTR_FIELDS.forEach(f=>{t[f.key]=0;});MEAL_TYPES.forEach(mt=>getEntries(plan,d,mt).forEach(({rid})=>{const r=recipes.find(x=>x.id===rid);if(r){const n=calcNutr(r.ingredients,r.servings);NUTR_FIELDS.forEach(f=>{t[f.key]+=n[f.key]||0;});}}));return t;};
      const wt=()=>{const t={};NUTR_FIELDS.forEach(f=>{t[f.key]=0;});DAYS.forEach(d=>{const dn=dayNutr(d);NUTR_FIELDS.forEach(f=>{t[f.key]+=dn[f.key]||0;});});const o={};NUTR_FIELDS.forEach(f=>{o[f.key]=Math.round(t[f.key]*10)/10;});o.kcal=Math.round(t.kcal);return o;};
      const maxKcal=Math.max(...DAYS.map(d=>dayNutr(d).kcal||0),1);
      const kcalColor=k=>{if(k===0)return P.border;if(k<1200)return"#BBDEFB";if(k<=2500)return P.greenDk;return"#FFAB91";};
      const totals=wt();
      return <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,background:P.card,borderRadius:14,padding:"12px 16px",border:`1px solid ${P.border}`}}>
          <button onClick={()=>setOffset(o=>Math.min(o+1,allKeys.length-1))} disabled={offset>=allKeys.length-1} style={{background:P.purple,border:"none",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:14,opacity:offset>=allKeys.length-1?0.4:1}}>‹</button>
          <div style={{flex:1,textAlign:"center"}}><div style={{fontFamily:"'Playfair Display', serif",fontSize:17,color:P.text}}>{weekLabel(key)}</div>{offset===0&&<div style={{fontSize:11,color:P.tealDk,fontFamily:"Lato, sans-serif"}}>Inneværende uke</div>}</div>
          <button onClick={()=>setOffset(o=>Math.max(o-1,0))} disabled={offset===0} style={{background:P.purple,border:"none",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:14,opacity:offset===0?0.4:1}}>›</button>
        </div>
        <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16,marginBottom:14}}>
          <div style={{fontFamily:"'Playfair Display', serif",fontSize:15,color:P.text,marginBottom:14}}>Kalorier per dag</div>
          <div style={{display:"flex",gap:6,alignItems:"flex-end",height:120}}>
            {DAYS.map(d=>{const dn=dayNutr(d);const h=Math.round((dn.kcal/maxKcal)*100);return <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:10,color:P.muted,fontFamily:"Lato, sans-serif"}}>{dn.kcal||""}</div><div style={{width:"100%",height:`${h}%`,minHeight:dn.kcal?4:0,background:kcalColor(dn.kcal),borderRadius:"4px 4px 0 0"}}/><div style={{fontSize:10,color:P.text,fontFamily:"Lato, sans-serif"}}>{d.slice(0,3)}</div></div>;})}
          </div>
        </div>
        <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16,marginBottom:14}}>
          <div style={{fontFamily:"'Playfair Display', serif",fontSize:15,color:P.text,marginBottom:12}}>Totalt for uka</div>
          <NutrBadges nutr={totals}/>
          <div style={{marginTop:10,fontSize:11,color:P.muted,fontFamily:"Lato, sans-serif"}}>Snitt per dag: {Math.round(totals.kcal/7)} kcal · {Math.round(totals.protein/7*10)/10}g protein</div>
        </div>
        <div style={{background:P.card,borderRadius:14,border:`1px solid ${P.border}`,padding:16}}>
          <div style={{fontFamily:"'Playfair Display', serif",fontSize:15,color:P.text,marginBottom:12}}>Dag for dag</div>
          {DAYS.map(d=>{const dn=dayNutr(d);const meals=MEAL_TYPES.flatMap(mt=>getEntries(plan,d,mt).map(({rid})=>{const r=recipes.find(x=>x.id===rid);return r?{name:r.name,mt}:null;})).filter(Boolean);return <div key={d} style={{padding:"8px 0",borderBottom:`1px solid ${P.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:meals.length?5:0}}>
              <div style={{fontFamily:"Lato, sans-serif",fontSize:13,fontWeight:700,color:meals.length?P.text:P.muted}}>{d}</div>
              {meals.length>0&&<div style={{display:"flex",gap:5}}><Badge label="Kcal" value={Math.round(dn.kcal)} unit="" color={P.yellow}/><Badge label="P" value={Math.round(dn.protein*10)/10} unit="g" color={P.green}/><Badge label="K" value={Math.round(dn.carbs*10)/10} unit="g" color={P.blue}/></div>}
              {meals.length===0&&<div style={{fontSize:11,color:P.muted,fontFamily:"Lato, sans-serif"}}>Ingen måltider</div>}
            </div>
            {meals.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{meals.map((m,i)=><span key={i} style={{background:MC[m.mt]?.bg||P.bg,borderRadius:8,padding:"2px 8px",fontSize:11,fontFamily:"Lato, sans-serif",color:P.text}}>{m.name}</span>)}</div>}
          </div>;})}
        </div>
      </div>;
    }

    function App(){
      const [user,setUser]=useState(undefined);
      const [profile,setProfile]=useState(null);
      const [recipes,setRecipes]=useState([]);
      const [weekPlan,setWeekPlan]=useState(emptyWeekPlan());
      const [pantry,setPantry]=useState([]);
      const [weekHistory,setWeekHistory]=useState({});
      const [tab,setTab]=useState("recipes");
      const [showForm,setShowForm]=useState(false);
      const [editingRecipe,setEditingRecipe]=useState(null);
      const [addToPlanTarget,setAddToPlanTarget]=useState(null);
      const [filterMeal,setFilterMeal]=useState("Alle");
      const [filterCat,setFilterCat]=useState("Alle");
      const [search,setSearch]=useState("");

      useEffect(()=>{
        return onAuthStateChanged(auth,async u=>{
          setUser(u||null);
          if(u){
            const pSnap=await getDoc(doc(db,"users",u.uid));
            if(pSnap.exists()){setProfile(pSnap.data());}
            else{const p={email:u.email,createdAt:new Date().toISOString(),gender:""};await setDoc(doc(db,"users",u.uid),p);setProfile(p);}
          }else{setProfile(null);setRecipes([]);setPantry([]);setWeekPlan(emptyWeekPlan());setWeekHistory({});}
        });
      },[]);

      useEffect(()=>{if(!user)return;const q=query(collection(db,"users",user.uid,"recipes"));return onSnapshot(q,snap=>{setRecipes(snap.docs.map(d=>({...d.data(),id:d.id})));});},[user]);
      useEffect(()=>{if(!user)return;const q=query(collection(db,"users",user.uid,"pantry"));return onSnapshot(q,snap=>{setPantry(snap.docs.map(d=>({...d.data(),id:d.id})));});},[user]);

      useEffect(()=>{
        if(!user)return;
        (async()=>{
          const wpSnap=await getDoc(doc(db,"users",user.uid,"data","weekplan"));
          if(wpSnap.exists())setWeekPlan(wpSnap.data().plan||emptyWeekPlan());
          const whSnap=await getDoc(doc(db,"users",user.uid,"data","weekhistory"));
          if(whSnap.exists())setWeekHistory(whSnap.data().history||{});
        })();
      },[user]);

      useEffect(()=>{
        if(!user)return;
        const t=setTimeout(async()=>{
          await setDoc(doc(db,"users",user.uid,"data","weekplan"),{plan:weekPlan});
          const key=getWeekKey(0);
          const hasData=DAYS.some(d=>MEAL_TYPES.some(mt=>(weekPlan[d]?.[mt]||[]).length>0));
          if(hasData){const newH={...weekHistory,[key]:weekPlan};setWeekHistory(newH);await setDoc(doc(db,"users",user.uid,"data","weekhistory"),{history:newH});}
        },1500);
        return()=>clearTimeout(t);
      },[weekPlan,user]);

      const saveRecipe=async(r)=>{
        if(editingRecipe){await updateDoc(doc(db,"users",user.uid,"recipes",r.id),r);}
        else{await addDoc(collection(db,"users",user.uid,"recipes"),r);}
        setShowForm(false);setEditingRecipe(null);
      };

      const deleteRecipe=async(id)=>{
        if(window.confirm("Slett denne oppskriften?"))await deleteDoc(doc(db,"users",user.uid,"recipes",id));
      };

      const filtered=recipes.filter(r=>{
        if(filterMeal!=="Alle"&&r.mealType!==filterMeal)return false;
        if(filterCat!=="Alle"&&r.category!==filterCat)return false;
        if(search&&!r.name.toLowerCase().includes(search.toLowerCase()))return false;
        return true;
      });

      const TABS=[["recipes","📖 Oppskrifter"],["pantry","🫙 Spiskammer"],["plan","📅 Ukeplan"],["shopping","🛒 Handel"],["stats","📊 Statistikk"],["profile","👤 Profil"]];

      if(user===undefined)return <div style={{minHeight:"100vh",background:P.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:"Lato, sans-serif",color:P.muted,fontSize:16}}>Laster…</div></div>;
      if(user===null)return <AuthScreen/>;

      return <div style={{minHeight:"100vh",background:P.bg}}>
        <div style={{background:P.card,borderBottom:`1px solid ${P.border}`,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,gap:8}}>
          <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}><span style={{fontSize:22}}>🥘</span><div><div style={{fontFamily:"'Playfair Display', serif",fontSize:16,color:P.text,lineHeight:1}}>Måltidsplanlegger</div><div style={{fontSize:9,color:P.muted}}>{user.email}</div></div></div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {TABS.map(([key,label])=><button key={key} onClick={()=>setTab(key)} style={{background:tab===key?P.purpleDk:"transparent",border:`1.5px solid ${tab===key?P.purpleDk:P.border}`,borderRadius:10,padding:"5px 9px",cursor:"pointer",fontFamily:"Lato, sans-serif",fontSize:11,color:tab===key?"#fff":P.text,whiteSpace:"nowrap"}}>{label}</button>)}
          </div>
        </div>
        <div style={{maxWidth:1000,margin:"0 auto",padding:"16px 12px"}}>
          {tab==="recipes"&&<>
            {showForm||editingRecipe?<RecipeForm initial={editingRecipe} pantry={pantry} onSave={saveRecipe} onCancel={()=>{setShowForm(false);setEditingRecipe(null);}}/>:<>
              <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                <input style={{...iSt,flex:1,minWidth:120}} placeholder="🔍 Søk…" value={search} onChange={e=>setSearch(e.target.value)}/>
                <select style={iSt} value={filterMeal} onChange={e=>setFilterMeal(e.target.value)}><option value="Alle">Alle måltider</option>{MEAL_TYPES.map(m=><option key={m}>{m}</option>)}</select>
                <select style={iSt} value={filterCat} onChange={e=>setFilterCat(e.target.value)}><option value="Alle">Alle kategorier</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
                <button onClick={()=>{setShowForm(true);setEditingRecipe(null);}} style={{background:P.greenDk,border:"none",borderRadius:10,padding:"7px 14px",cursor:"pointer",fontFamily:"Lato, sans-serif",color:"#fff",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>+ Ny oppskrift</button>
              </div>
              {filtered.length===0&&<div style={{textAlign:"center",padding:"55px 0",color:P.muted}}><div style={{fontSize:42,marginBottom:10}}>🍳</div><div style={{fontFamily:"'Playfair Display', serif",fontSize:16}}>Ingen oppskrifter ennå</div></div>}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(275px,1fr))",gap:12}}>
                {filtered.map(r=><RecipeCard key={r.id} recipe={r} pantry={pantry} onEdit={r=>{setEditingRecipe(r);setShowForm(true);}} onDelete={deleteRecipe} onAddToPlan={r=>{setAddToPlanTarget(r);setTab("plan");}}/>)}
              </div>
            </>}
          </>}
          {tab==="pantry"&&<PantryTab uid={user.uid} pantry={pantry} setPantry={setPantry}/>}
          {tab==="plan"&&<WeekPlan recipes={recipes} weekPlan={weekPlan} setWeekPlan={setWeekPlan} addToPlanTarget={addToPlanTarget} setAddToPlanTarget={setAddToPlanTarget}/>}
          {tab==="shopping"&&<ShoppingList recipes={recipes} weekPlan={weekPlan} pantry={pantry}/>}
          {tab==="stats"&&<StatsTab recipes={recipes} weekPlan={weekPlan} weekHistory={weekHistory}/>}
          {tab==="profile"&&<ProfileTab user={user} profile={profile} setProfile={setProfile} recipes={recipes}/>}
        </div>
      </div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>

</body>
</html>
